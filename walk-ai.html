<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>トレジャーシーカー伊勢 | ウォーキング診断</title>

<!-- ================================================================
     Firebase（home.html / login.html と同一設定）
     ================================================================ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  /* ==============================================================
     デザイントークン：home.html と完全に同じ値を使用し、
     アプリ全体のトンマナ（森グリーン × 鳥居朱 × 和紙クリーム）を維持する。
     ============================================================== */
  :root{
    --forest:#3E6B4F;
    --forest-deep:#2C4E3A;
    --forest-soft:#EAF3EC;
    --cream:#FBF8F0;
    --card:#FFFFFF;
    --torii:#B5502F;
    --gold:#E3A73B;
    --ink:#233127;
    --ink-soft:#7A8A7D;
    --line:#E7E2D4;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Noto Sans JP", sans-serif;
    color:var(--ink);
    background:var(--forest-soft);
    display:flex;
    justify-content:center;
    overscroll-behavior-y:none;
  }

  .stage{
    width:100%;
    max-width:480px;
    min-height:100vh;
    min-height:100dvh;
    background:var(--cream);
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
  }

  /* ---------- 共通ヘッダー（戻る・タイトル・進捗バー） ---------- */
  header{
    background:linear-gradient(155deg, var(--forest) 0%, var(--forest-deep) 100%);
    padding:calc(env(safe-area-inset-top,0px) + 16px) 18px 18px;
    border-radius:0 0 22px 22px;
    color:#fff;
    position:relative;
    overflow:hidden;
    flex-shrink:0;
  }
  header::after{
    content:"";
    position:absolute; right:-30px; top:-30px;
    width:150px; height:150px;
    background:radial-gradient(circle, rgba(255,255,255,0.14), transparent 70%);
  }
  .header-row{display:flex; align-items:center; gap:10px; position:relative; z-index:1;}
  .back-btn{
    width:32px; height:32px; border-radius:50%;
    background:rgba(255,255,255,0.16);
    border:1px solid rgba(255,255,255,0.28);
    display:flex; align-items:center; justify-content:center;
    color:#fff; flex-shrink:0; cursor:pointer;
  }
  .back-btn svg{width:16px; height:16px;}
  .header-title{
    font-family:"Kiwi Maru", serif;
    font-weight:500;
    font-size:17px;
    flex:1;
  }
  .header-sub{font-size:11px; color:#D8E7DC; margin-top:2px;}

  /* 進捗バー */
  .progress-track{
    margin-top:14px;
    height:6px;
    border-radius:6px;
    background:rgba(255,255,255,0.22);
    overflow:hidden;
    position:relative; z-index:1;
  }
  .progress-fill{
    height:100%;
    border-radius:6px;
    background:var(--gold);
    width:0%;
    transition:width .4s cubic-bezier(.4,0,.2,1);
  }
  .progress-label{
    margin-top:6px;
    font-size:10.5px;
    color:#D8E7DC;
    text-align:right;
    position:relative; z-index:1;
  }

  main{
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:18px 18px calc(env(safe-area-inset-bottom,0px) + 24px);
  }

  /* ---------- 画面切り替え（SPA方式） ---------- */
  .screen{ display:none; }
  .screen.active{ display:block; animation:fadeSlide .35s ease; }
  @keyframes fadeSlide{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ---------- 質問カード ---------- */
  .q-card{
    background:var(--card);
    border-radius:20px;
    padding:22px 18px;
    box-shadow:0 10px 26px rgba(44,78,58,0.10);
  }
  .q-index{
    font-size:12px; font-weight:700; color:var(--forest);
    letter-spacing:.04em;
  }
  .q-text{
    font-family:"Kiwi Maru", serif;
    font-size:18px;
    font-weight:500;
    color:var(--ink);
    margin:8px 0 18px;
    line-height:1.5;
  }
  .opt-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .opt-btn{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:8px;
    background:var(--forest-soft);
    border:2px solid transparent;
    border-radius:16px;
    padding:16px 8px;
    cursor:pointer;
    color:var(--ink);
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
    text-align:center;
  }
  .opt-btn .opt-ico{
    width:30px; height:30px;
    display:flex; align-items:center; justify-content:center;
    color:var(--forest);
  }
  .opt-btn .opt-ico svg{width:22px; height:22px;}
  .opt-btn span.opt-label{font-size:12.5px; font-weight:700;}
  .opt-btn:active{ transform:scale(0.96); }
  .opt-btn.selected{
    background:#fff;
    border-color:var(--forest);
    box-shadow:0 6px 14px rgba(44,78,58,0.16);
  }
  .opt-btn.selected .opt-ico{ color:var(--torii); }

  /* ---------- ナビゲーションボタン（次へ／戻る） ---------- */
  .nav-btn-row{
    display:flex; gap:10px;
    margin-top:20px;
  }
  .btn{
    flex:1;
    border:none;
    border-radius:14px;
    padding:14px 10px;
    font-size:14.5px;
    font-weight:700;
    font-family:"Noto Sans JP", sans-serif;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px;
    transition:opacity .15s ease, transform .1s ease;
  }
  .btn:active{ transform:scale(0.97); }
  .btn-primary{
    background:linear-gradient(135deg, var(--forest) 0%, var(--forest-deep) 100%);
    color:#fff;
    box-shadow:0 8px 18px rgba(44,78,58,0.22);
  }
  .btn-primary:disabled{
    opacity:.4; box-shadow:none; cursor:not-allowed;
  }
  .btn-ghost{
    background:var(--card);
    color:var(--ink-soft);
    border:1px solid var(--line);
    flex:0 0 90px;
  }
  .btn-full{ width:100%; }
  .btn svg{width:16px; height:16px;}
  .detail-source-note a{ color:var(--forest); font-weight:700; text-decoration:underline; }

  /* ---------- ローディング（結果算出中） ---------- */
  .calc-wrap{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:70px 20px;
    text-align:center;
  }
  .calc-leaf{
    width:40px; height:40px;
    border:4px solid #DDE7DD;
    border-top-color:var(--forest);
    border-radius:50%;
    animation:spin .8s linear infinite;
    margin-bottom:16px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .calc-wrap p{ color:var(--ink-soft); font-size:13px; margin:2px 0; }
  .calc-wrap .calc-title{ font-family:"Kiwi Maru", serif; font-size:16px; color:var(--ink); margin-bottom:4px; }

  /* ---------- 結果一覧（おすすめ上位3件） ---------- */
  .result-lead{
    text-align:center;
    margin-bottom:16px;
  }
  .result-lead .rl-title{
    font-family:"Kiwi Maru", serif;
    font-size:19px;
    color:var(--ink);
  }
  .result-lead .rl-sub{
    font-size:12px; color:var(--ink-soft); margin-top:4px;
  }

  .course-card{
    background:var(--card);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 24px rgba(44,78,58,0.10);
    margin-bottom:16px;
    cursor:pointer;
    position:relative;
  }
  .course-card .rank-tag{
    position:absolute; left:12px; top:12px; z-index:2;
    background:var(--forest-deep);
    color:#fff;
    font-size:11px; font-weight:700;
    padding:4px 10px;
    border-radius:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.18);
  }
  .course-card .rank-tag.top{ background:var(--torii); }
  .course-photo{
    width:100%; height:140px;
    object-fit:cover;
    background:var(--forest-soft);
    display:block;
  }
  .course-photo.noimg{
    display:flex; align-items:center; justify-content:center;
    color:var(--forest);
  }
  .course-photo.noimg svg{ width:34px; height:34px; opacity:.5; }
  .course-body{ padding:14px 16px 16px; }
  .stars{ display:flex; align-items:center; gap:2px; margin-bottom:6px; }
  .stars svg{ width:14px; height:14px; }
  .stars .star-on{ color:var(--gold); }
  .stars .star-off{ color:var(--line); }
  .match-pct{ font-size:11px; color:var(--forest); font-weight:700; margin-left:4px; }
  .course-name{
    font-family:"Kiwi Maru", serif;
    font-size:16.5px;
    color:var(--ink);
    margin-bottom:6px;
  }
  .course-meta{
    display:flex; flex-wrap:wrap; gap:6px;
    margin-bottom:8px;
  }
  .meta-chip{
    display:flex; align-items:center; gap:4px;
    background:var(--forest-soft);
    color:var(--forest-deep);
    font-size:11px; font-weight:700;
    padding:4px 9px;
    border-radius:20px;
  }
  .meta-chip svg{ width:12px; height:12px; }
  .meta-chip.garbage{ background:#FCEFE3; color:var(--torii); }
  .course-desc{
    font-size:12.5px; color:var(--ink-soft); line-height:1.6;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .course-cta{
    margin-top:12px;
    width:100%;
    background:var(--forest-soft);
    color:var(--forest-deep);
    border:none;
    border-radius:12px;
    padding:11px;
    font-size:13px; font-weight:700;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .course-cta svg{ width:14px; height:14px; }

  .empty-result{
    text-align:center; padding:50px 16px; color:var(--ink-soft); font-size:13px;
  }

  .retry-link{
    display:block; text-align:center;
    margin-top:6px;
    font-size:12.5px; color:var(--forest); font-weight:700;
    text-decoration:none;
  }

  /* ---------- コース詳細 ---------- */
  .detail-photo{
    width:100%; height:200px; object-fit:cover;
    border-radius:20px;
    background:var(--forest-soft);
    margin-bottom:16px;
  }
  .detail-photo.noimg{
    display:flex; align-items:center; justify-content:center; color:var(--forest);
  }
  .detail-photo.noimg svg{ width:44px; height:44px; opacity:.5; }
  .detail-title{
    font-family:"Kiwi Maru", serif;
    font-size:21px;
    color:var(--ink);
    margin-bottom:8px;
  }
  .detail-stats{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
    background:var(--card);
    border-radius:16px;
    padding:14px 8px;
    box-shadow:0 6px 16px rgba(44,78,58,0.08);
    margin-bottom:16px;
  }
  .detail-stat{ text-align:center; }
  .detail-stat .ds-num{
    font-family:"Kiwi Maru", serif;
    font-size:17px; color:var(--forest-deep);
  }
  .detail-stat .ds-label{ font-size:10.5px; color:var(--ink-soft); margin-top:3px; }
  .detail-section-title{
    font-size:12.5px; font-weight:700; color:var(--ink-soft);
    letter-spacing:.03em;
    margin:18px 2px 8px;
  }
  .detail-desc{
    background:var(--card);
    border-radius:16px;
    padding:14px 16px;
    font-size:13.5px; line-height:1.8; color:var(--ink);
    box-shadow:0 6px 16px rgba(44,78,58,0.06);
  }
  .detail-tags{ display:flex; flex-wrap:wrap; gap:8px; }

  /* ---------- 詳細画面：ここナビ／伊勢市公式コース情報 ボタン ---------- */
  .nav-action-row{
    display:flex; flex-direction:column; gap:10px;
    margin-top:20px;
  }
  .btn-outline{
    background:var(--card);
    color:var(--forest-deep);
    border:1.5px solid var(--forest);
  }

  /* ---------- 詳細画面：ナビ導線ボタンの上の注意書き ---------- */
  .caution-note{
    display:flex;
    align-items:flex-start;
    gap:8px;
    margin-top:20px;
    padding:12px 14px;
    background:#FBF1E6;
    border:1px solid rgba(181,80,47,0.28);
    border-radius:14px;
  }
  .caution-note .caution-ico{
    flex-shrink:0;
    font-size:14px;
    line-height:1.5;
  }
  .caution-note p{
    margin:0;
    font-size:11.5px;
    line-height:1.65;
    color:var(--ink);
  }
  .caution-note p strong{
    display:block;
    font-size:12px;
    color:var(--torii);
    margin-bottom:3px;
  }

  .toast{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%);
    background:rgba(35,49,39,0.92); color:#fff;
    font-size:12.5px; padding:10px 18px; border-radius:30px;
    z-index:99; opacity:0; pointer-events:none;
    transition:opacity .25s ease;
  }
  .toast.show{ opacity:1; }

  /* ---------- ローディングオーバーレイ（初期認証待ち） ---------- */
  .loading-overlay{
    position:fixed; inset:0; z-index:99;
    background:var(--cream);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:10px;
    transition:opacity .35s ease;
  }
  .loading-overlay .leaf{
    width:30px; height:30px;
    border:3px solid #DDE7DD;
    border-top-color:var(--forest);
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  .loading-overlay p{color:var(--ink-soft); font-size:13px; margin:0;}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="leaf"></div>
  <p>読み込み中…</p>
</div>

<div class="stage" id="stage">

  <!-- ============================================================
       共通ヘッダー（質問画面・結果画面・詳細画面で共有。ナビ画面のみ専用ヘッダー）
       ============================================================ -->
  <header id="mainHeader">
    <div class="header-row">
      <div class="back-btn" id="headerBackBtn" title="戻る">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </div>
      <div>
        <div class="header-title" id="headerTitle">ウォーキング診断</div>
        <div class="header-sub" id="headerSub">質問に答えてぴったりのコースを見つけよう</div>
      </div>
    </div>
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">質問 1 / 6</div>
  </header>

  <main id="mainArea">

    <!-- ==========================================================
         画面1：質問カード（質問1〜6を1枚ずつ、スワイプ感覚で切り替え）
         ========================================================== -->
    <section class="screen active" id="screen-question">
      <div class="q-card">
        <div class="q-index" id="qIndexLabel">質問 1</div>
        <div class="q-text" id="qTextLabel">今日は何が目的ですか？</div>
        <div class="opt-grid" id="qOptionsGrid"><!-- JSで動的生成 --></div>
      </div>

      <div class="nav-btn-row">
        <button class="btn btn-ghost" id="qBackBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          戻る
        </button>
        <button class="btn btn-primary" id="qNextBtn" disabled>
          次へ
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </section>

    <!-- ==========================================================
         画面2：算出中（ルールベース判定のローディング表現）
         ========================================================== -->
    <section class="screen" id="screen-calc">
      <div class="calc-wrap">
        <div class="calc-leaf"></div>
        <div class="calc-title">コースを探しています…</div>
        <p>回答内容と登録コースを照合しています</p>
      </div>
    </section>

    <!-- ==========================================================
         画面3：おすすめ結果（上位3件）
         ========================================================== -->
    <section class="screen" id="screen-result">
      <div class="result-lead">
        <div class="rl-title">あなたへのおすすめコース</div>
        <div class="rl-sub">回答内容にもとづく一致度の高い順に表示しています</div>
      </div>
      <div id="resultList"><!-- JSで動的生成 --></div>
      <a href="#" class="retry-link" id="retryLink">もう一度質問に答える</a>
    </section>

    <!-- ==========================================================
         画面4：コース詳細
         ========================================================== -->
    <section class="screen" id="screen-detail">
      <div id="detailPhotoWrap"></div>
      <div class="detail-title" id="detailName"></div>
      <div class="course-meta" id="detailChips" style="margin-bottom:16px;"></div>

      <div class="detail-stats">
        <div class="detail-stat">
          <div class="ds-num" id="detailDistance">-</div>
          <div class="ds-label">距離</div>
        </div>
        <div class="detail-stat">
          <div class="ds-num" id="detailTime">-</div>
          <div class="ds-label">所要時間</div>
        </div>
        <div class="detail-stat">
          <div class="ds-num" id="detailDifficulty">-</div>
          <div class="ds-label">難易度</div>
        </div>
      </div>

      <div class="detail-section-title">コースについて</div>
      <div class="detail-desc" id="detailDesc"></div>
      <div class="detail-source-note" id="detailSourceNote" style="display:none; margin-top:10px; font-size:11.5px; color:var(--ink-soft); line-height:1.6;"></div>

      <!-- ▼▼ ナビ導線：カスタム地図は持たず、既存の仕組みに乗せる ▼▼
           ・「ここナビで開く」= map.html の popup と同じ Google Maps
             ディレクション（https://www.google.com/maps/dir/?api=1&destination=…）
             を新規タブで開く。実際の道案内はGoogleマップに任せる。
           ・「伊勢市公式コース情報(PDF)を見る」= course.sourceUrl（伊勢市公式サイトの
             コースPDF）を新規タブで開く。座標や住所から作った目的地は
             ズレている場合があるため、公式一次情報へ直接誘導する。 -->
      <div class="caution-note">
        <span class="caution-ico">⚠️</span>
        <p><strong>ご利用前にご確認ください</strong>道路状況、施設の営業状況、通行規制などは変更される場合があります。実際に利用する際は、現地の案内や最新の公式情報をご確認ください。</p>
      </div>
      <div class="nav-action-row">
        <button class="btn btn-primary btn-full" id="openGoogleMapsBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
          ここナビで行く（Googleマップ）
        </button>
        <button class="btn btn-outline btn-full" id="openAppMapBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3v5h5M9 13h6M9 17h6M9 9h1"/><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/></svg>
          伊勢市公式コース情報(PDF)を見る
        </button>
      </div>
    </section>

  </main>

</div>

<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   Firebase 初期化（home.html / login.html と同じ設定）
   ===================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyB7f8QThoqYc-iDuMhKqp3MGBRAhln9ZhI",
  authDomain: "treasure-seeker-ise.firebaseapp.com",
  projectId: "treasure-seeker-ise",
  storageBucket: "treasure-seeker-ise.firebasestorage.app",
  messagingSenderId: "278199675502",
  appId: "1:278199675502:web:295dfa975a03707f27947f"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const LOGIN_PAGE = "login.html";
const HOME_PAGE  = "home.html";

/* =====================================================================
   質問データ定義
   ---------------------------------------------------------------------
   ・id       : 回答を保存するキー（Firestoreコース側フィールドと対応させる）
   ・text     : 質問文
   ・options  : 選択肢（value = 判定ロジックで使う内部値 / label = 表示名）
   質問を増減・変更したい場合は、この配列と後述の SCORING 設定だけを
   編集すればよいように設計している（HTML/CSSは触らなくてよい）。
   ===================================================================== */
const QUESTIONS = [
  {
    id: 'purpose',
    text: '今日は何が目的ですか？',
    options: [
      { value:'health',   label:'健康',     icon:'heart' },
      { value:'garbage',  label:'ゴミ拾い', icon:'trash' },

/* =====================================================================
   質問画面の描画
   ===================================================================== */
function renderQuestion(){
  const q = QUESTIONS[currentQIndex];

  headerTitle.textContent = 'ウォーキング診断';
  headerSub.textContent = '質問に答えてぴったりのコースを見つけよう';
  progressTrack.style.display = '';
  progressLabel.style.display = '';

  qIndexLabel.textContent = `質問 ${currentQIndex + 1}`;
  qTextLabel.textContent = q.text;

  const pct = ((currentQIndex) / QUESTIONS.length) * 100;
  progressFill.style.width = pct + '%';
  progressLabel.textContent = `質問 ${currentQIndex + 1} / ${QUESTIONS.length}`;

  qOptionsGrid.innerHTML = q.options.map(opt => {
    const selected = answers[q.id] === opt.value;
    return `
      <button type="button" class="opt-btn ${selected ? 'selected' : ''}" data-value="${escapeAttr(opt.value)}">
        <div class="opt-ico">${iconSvg(opt.icon)}</div>
        <span class="opt-label">${escapeHtml(opt.label)}</span>
      </button>
    `;
  }).join('');

  // 選択肢クリック
  qOptionsGrid.querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      // valueは元々の型（数値 or 文字列）に戻して保存する
      const raw = btn.dataset.value;
      const matchedOpt = q.options.find(o => String(o.value) === raw);
      answers[q.id] = matchedOpt.value;
      renderQuestion(); // 選択状態を反映して再描画
    });
  });

  qNextBtn.disabled = (answers[q.id] === undefined);
  qNextBtn.textContent = ''; // 一旦クリアしてから中身を再構築
  qNextBtn.innerHTML = (currentQIndex === QUESTIONS.length - 1)
    ? '結果を見る <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>'
    : '次へ <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>';

  showScreen('screen-question');
}

qNextBtn.addEventListener('click', () => {
  if(currentQIndex < QUESTIONS.length - 1){
    currentQIndex++;
    renderQuestion();
  }else{
    // 最終質問 → 判定処理へ
    runRecommendation();
  }
});

qBackBtn.addEventListener('click', () => {
  if(currentQIndex > 0){
    currentQIndex--;
    renderQuestion();
  }else{
    // 最初の質問で戻る → ホームへ
    window.location.href = HOME_PAGE;
  }
});

/* ヘッダーの戻るボタン（質問画面／結果画面／詳細画面で共通利用） */
headerBackBtn.addEventListener('click', () => {
  const activeScreen = document.querySelector('.screen.active').id;
  if(activeScreen === 'screen-question'){
    qBackBtn.click();
  }else if(activeScreen === 'screen-result'){
    // 結果画面から戻る＝質問をやり直す
    resetQuiz();
  }else if(activeScreen === 'screen-detail'){
    renderResultScreen(); // 詳細→結果一覧に戻る
  }else{
    window.location.href = HOME_PAGE;
  }
});

function resetQuiz(){
  currentQIndex = 0;
  Object.keys(answers).forEach(k => delete answers[k]);
  renderQuestion();
}
retryLink.addEventListener('click', (e) => { e.preventDefault(); resetQuiz(); });


/* =====================================================================
   ★★★ 判定エンジン（ルールベース） ★★★
   ---------------------------------------------------------------------
   将来的に生成AI（OpenAI API等）へ置き換えられるよう、
   「回答(answers) と コース一覧(courses) を受け取り、
     スコア付きのおすすめ配列を返す」という関数インターフェースに
   処理を閉じ込めている。

   ・現在   : RECOMMEND_ENGINE = 'rule'   → ruleBasedRecommend() を使用
   ・将来   : RECOMMEND_ENGINE = 'openai' → aiRecommend() に差し替え可能
              （aiRecommend は同じ引数・同じ戻り値の形にして実装すればよい）
   ===================================================================== */
const RECOMMEND_ENGINE = 'rule'; // 'rule' | 'openai'（将来用。現状は'rule'固定）

/**
 * ルールベース判定のスコア配点。
 * 合計が100点になるよう設計し、一致率(%)としてそのまま表示できるようにする。
 */
const SCORE_WEIGHTS = {
  purpose:  30, // 目的の一致
  time:     25, // 所要時間の近さ
  stamina:  15, // 体力・難易度の一致
  companion:15, // 同行者との相性
  scenery:  10, // 見たい景色の一致
  garbage:   5, // ゴミ拾いレベルの一致
};

/* 体力(stamina)と難易度(difficulty)のマッピング。近い段階ほど部分点を与える */
const STAMINA_LEVEL = { beginner:1, normal:2, advanced:3, '初心者':1, '普通':2, '上級':3 };

/**
 * コース1件に対して回答とのスコアを算出する。
 * @param {Object} a 回答（answers）
 * @param {Object} c walking_courses の1ドキュメント（idを含む）
 * @returns {number} 0〜100 のスコア
 */
function scoreCourse(a, c){
  let score = 0;

  // ---- 目的 (purpose) ----
  // courseの purpose は 単一値 or 配列 のどちらでも受け付ける
  const coursePurposes = toArray(c.purpose);
  if(a.purpose && coursePurposes.includes(a.purpose)){
    score += SCORE_WEIGHTS.purpose;
  }

  // ---- 時間 (time) ----
  // 選択した分数とコースの time(分) の差が小さいほど高得点。
  // 差0分=満点、差60分以上=0点として線形に減点する。
  if(typeof c.time === 'number' && typeof a.time === 'number'){
    const diff = Math.abs(c.time - a.time);
    const ratio = Math.max(0, 1 - diff / 60);
    score += SCORE_WEIGHTS.time * ratio;
  }

  // ---- 体力・難易度 (stamina / difficulty) ----
  const wantLv = STAMINA_LEVEL[a.stamina];
  const courseLv = STAMINA_LEVEL[c.difficulty];
  if(wantLv && courseLv){
    const lvDiff = Math.abs(wantLv - courseLv);
    // 完全一致=満点、1段階差=半分、2段階差=0点
    const ratio = lvDiff === 0 ? 1 : (lvDiff === 1 ? 0.5 : 0);
    score += SCORE_WEIGHTS.stamina * ratio;
  }

  // ---- 同行者 (companion) ----
  // 犬・ベビーカー・家族・高齢者など、コース側の対応フラグと照合。
  // 「一人」はどのコースでも歩けるとみなし満点を与える。
  score += SCORE_WEIGHTS.companion * companionMatchRatio(a.companion, c);

  // ---- 景色 (scenery) ----
  const courseScenery = toArray(c.scenery);
  if(a.scenery && courseScenery.includes(a.scenery)){
    score += SCORE_WEIGHTS.scenery;
  }

  // ---- ゴミ拾い (garbage_level) ----
  if(a.garbageLevel && c.garbage_level){
    if(a.garbageLevel === c.garbage_level){
      score += SCORE_WEIGHTS.garbage;
    }else if(
      // 「少し」は「しない」「積極的」いずれとも半分だけ相性ありとする
      a.garbageLevel === 'little' || c.garbage_level === 'little'
    ){
      score += SCORE_WEIGHTS.garbage * 0.5;
    }
  }

  return Math.round(Math.min(100, score));
}

/* 同行者フィールドとの適合率(0〜1)を返す */
function companionMatchRatio(companion, c){
  if(!companion) return 0;
  if(companion === 'alone') return 1; // 一人はどのコースでもOK扱い

  const flagMap = {
    dog:        c.dog === true,
    family:     c.family === true,
    kids:       c.family === true, // 子どもはfamily対応コースを流用
    senior:     c.family === true, // 高齢者は家族向けコースと相性が良いとみなす
    stroller:   c.family === true, // ベビーカーも家族向けコースと相性が良いとみなす
  };
  return flagMap[companion] ? 1 : 0.3; // 非対応でも「歩けなくはない」ため最低点は残す
}

function toArray(v){
  if(v === undefined || v === null) return [];
  return Array.isArray(v) ? v : [v];
}

/**
 * ルールベース判定：回答に対して全コースをスコアリングし、上位3件を返す。
 */
function ruleBasedRecommend(a, courses){
  const MIN_RESULTS = 3;   // 最低表示件数
  const MAX_RESULTS = 5;   // 最大表示件数
  const GOOD_SCORE   = 70; // この点数以上は「よく合っている」とみなす

  const scored = courses
    .map(c => ({ course:c, score:scoreCourse(a, c) }))
    .sort((x, y) => y.score - x.score);

  // 一致度70%以上のコースが多ければ最大5件まで、少なければ最低3件は出す
  const goodCount = scored.filter(s => s.score >= GOOD_SCORE).length;
  const count = Math.min(MAX_RESULTS, Math.max(MIN_RESULTS, goodCount));

  return scored.slice(0, count);
}

 * 【将来用スタブ】生成AI（OpenAI API等）による判定に差し替える場合のインターフェース例。
 * 実装時は、質問回答とコース一覧（または要約）をプロンプトに含めて、
 * 同じ形（[{course, score}, ...]）を返すように実装すればよい。
 * ※ 現状は未使用（呼び出されない）。
 */

/**
 * 判定エンジンの入り口（切り替え用ディスパッチャ）。
 */
async function recommendCourses(a, courses){
  if(RECOMMEND_ENGINE === 'openai'){
    return await aiRecommend(a, courses);
  }
  return ruleBasedRecommend(a, courses);
}

/* =====================================================================
   判定の実行フロー（質問終了 → Firestore取得 → 判定 → 結果表示）
   ===================================================================== */
async function runRecommendation(){
  showScreen('screen-calc');
  headerTitle.textContent = '判定中';
  headerSub.textContent = '少々お待ちください';
  progressFill.style.width = '100%';
  progressLabel.textContent = '判定中…';

  try{
    // まだ取得していなければ walking_courses を全件取得する。
    // ※ コース件数が多くなってきたら where() での事前絞り込みや
    //    ページングを検討する（現段階は全件取得を想定）。
    if(allCourses.length === 0){
      try{
        const snap = await db.collection('walking_courses').get();
        allCourses = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      }catch(fetchErr){
        console.warn('walking_courses の取得に失敗しました。フォールバックデータを使用します', fetchErr);
        allCourses = [];
      }
      // Firestoreにまだコースが登録されていない場合は、同梱のサンプルコースを使用する。
      // （Firestoreに1件でも登録されていれば、そちらのデータのみを使用する）
      if(allCourses.length === 0){
        allCourses = FALLBACK_COURSES;
      }
    }

    rankedResults = await recommendCourses(answers, allCourses);

    renderResultScreen();
  }catch(err){
    console.error('コース取得・判定に失敗しました', err);
    showToast('コースの取得に失敗しました');
    rankedResults = [];
    renderResultScreen();
  }
}

/* =====================================================================
   結果画面の描画
   ===================================================================== */
function renderResultScreen(){
  headerTitle.textContent = 'おすすめコース';
  headerSub.textContent = '気になるコースをタップして詳細を見よう';
  progressTrack.style.display = 'none';
  progressLabel.style.display = 'none';

  if(rankedResults.length === 0){
    resultList.innerHTML = `<div class="empty-result">条件に合うコースが見つかりませんでした。<br>質問の内容を変えて、もう一度お試しください。</div>`;
    showScreen('screen-result');
    return;
  }

  resultList.innerHTML = rankedResults.map(({course, score}, i) => {
    return renderCourseCard(course, score, i);
  }).join('');

  // カード全体クリック → 詳細画面へ
  rankedResults.forEach(({course}, i) => {
    const el = document.getElementById('course-card-' + i);
    if(el){
      el.addEventListener('click', () => openDetail(course));
    }
  });

  showScreen('screen-result');
}

/* 星評価：スコア(0-100)を5段階の★に変換 */
function scoreToStars(score){
  return Math.max(1, Math.round(score / 20)); // 20点=1つ星
}

function renderStars(score){
  const filled = scoreToStars(score);
  let html = '';
  for(let i=1;i<=5;i++){
    const on = i <= filled;
    html += `<svg viewBox="0 0 24 24" fill="${on ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.6" class="${on ? 'star-on' : 'star-off'}"><path d="M12 3l2.5 5.5L20 9l-4 4 1 6-5-3-5 3 1-6-4-4 5.5-.5z"/></svg>`;
  }
  return html;
}

const DIFFICULTY_LABEL = { beginner:'初心者向け', normal:'普通', advanced:'上級者向け' };
const PURPOSE_LABEL = {
  health:'健康', garbage:'ゴミ拾い', sightseeing:'観光', photo:'写真撮影',
  nature:'自然観察', exercise:'運動', dogwalk:'犬の散歩'
};
const SCENERY_LABEL = { sea:'海', river:'川', shrine:'神社', forest:'森林', town:'町並み', flower:'花', autumn:'紅葉' };
const GARBAGE_LABEL = { none:'ゴミ拾いなし', little:'ゴミ拾い少し', active:'ゴミ拾い積極的' };

function renderCourseCard(course, score, i){
  const rankLabel = ['1位', '2位', '3位'][i] || `${i+1}位`;
  const photoHtml = course.photo
    ? `<img class="course-photo" src="${escapeAttr(course.photo)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=&quot;course-photo noimg&quot;>${iconSvgAttr('leaf')}</div>'">`
    : `<div class="course-photo noimg">${iconSvg('leaf')}</div>`;

  const sceneryArr = toArray(course.scenery).map(s => SCENERY_LABEL[s] || s);

  return `
    <div class="course-card" id="course-card-${i}">
      <div class="rank-tag ${i===0 ? 'top' : ''}">${rankLabel}</div>
      ${photoHtml}
      <div class="course-body">
        <div class="stars">
          ${renderStars(score)}
          <span class="match-pct">一致度 ${score}%</span>
        </div>
        <div class="course-name">${escapeHtml(course.name || '名称未設定コース')}</div>
        <div class="course-meta">
          <div class="meta-chip">${iconSvg('run')}${escapeHtml(String(course.distance ?? '-'))}km</div>
          <div class="meta-chip">${iconSvg('clock')}${escapeHtml(String(course.time ?? '-'))}分</div>
          <div class="meta-chip">${DIFFICULTY_LABEL[course.difficulty] || course.difficulty || '-'}</div>
          ${sceneryArr.slice(0,2).map(s => `<div class="meta-chip">${escapeHtml(s)}</div>`).join('')}
          ${course.garbage_level ? `<div class="meta-chip garbage">${iconSvg('trashSmall')}${GARBAGE_LABEL[course.garbage_level] || course.garbage_level}</div>` : ''}
        </div>
        <div class="course-desc">${escapeHtml(course.description || '')}</div>
        <button type="button" class="course-cta" data-course-idx="${i}">
          ${iconSvg('flag')}このコースへ行く
        </button>
      </div>
    </div>
  `;
}
function iconSvgAttr(name){
  // onerror属性内に埋め込むため、属性用にエスケープ済みのSVG文字列を返す
  return iconSvg(name).replace(/"/g, '&quot;');
}

/* 「このコースへ行く」ボタン（カード内）→ 詳細画面へ（イベント委譲） */
resultList && resultList.addEventListener && resultList.addEventListener('click', (e) => {
  const btn = e.target.closest('.course-cta');
  if(!btn) return;
  e.stopPropagation();
  const idx = Number(btn.dataset.courseIdx);
  const item = rankedResults[idx];
  if(item) openDetail(item.course);
});


/* =====================================================================
   コース詳細画面
   ===================================================================== */
function openDetail(course){
  selectedCourse = course;

  headerTitle.textContent = 'コース詳細';
  headerSub.textContent = '';

  const photoWrap = document.getElementById('detailPhotoWrap');
  photoWrap.innerHTML = course.photo
    ? `<img class="detail-photo" src="${escapeAttr(course.photo)}" alt="" onerror="this.outerHTML='<div class=&quot;detail-photo noimg&quot;>${iconSvgAttr('leaf')}</div>'">`
    : `<div class="detail-photo noimg">${iconSvg('leaf')}</div>`;

  document.getElementById('detailName').textContent = course.name || '名称未設定コース';
  document.getElementById('detailDistance').textContent = (course.distance ?? '-') + 'km';
  document.getElementById('detailTime').textContent = (course.time ?? '-') + '分';
  document.getElementById('detailDifficulty').textContent = DIFFICULTY_LABEL[course.difficulty] || course.difficulty || '-';
  document.getElementById('detailDesc').textContent = course.description || '説明は登録されていません。';

  const chips = [];
  toArray(course.purpose).forEach(p => chips.push(PURPOSE_LABEL[p] || p));
  toArray(course.scenery).forEach(s => chips.push(SCENERY_LABEL[s] || s));
  if(course.garbage_level) chips.push(GARBAGE_LABEL[course.garbage_level] || course.garbage_level);
  if(course.dog) chips.push('犬OK');
  if(course.family) chips.push('家族向け');
  document.getElementById('detailChips').innerHTML = chips.map(c => `<div class="meta-chip">${escapeHtml(c)}</div>`).join('');

  // 伊勢市公式データを元にした「仮タグ」コースには、出典と注記を表示する
  const noteEl = document.getElementById('detailSourceNote');
  if(noteEl){
    if(course.tagStatus === 'estimated'){
      const link = course.sourceUrl
        ? `<a href="${escapeAttr(course.sourceUrl)}" target="_blank" rel="noopener">伊勢市公式コース情報（PDF）を見る</a>`
        : '';
      noteEl.innerHTML = `※このコースの目的・景色タグはAIによる推定（仮タグ）です。実際と異なる場合があります。${link}`;
      noteEl.style.display = '';
    }else{
      noteEl.style.display = 'none';
    }
  }

  showScreen('screen-detail');
}

/* =====================================================================
   ナビ導線：「ここナビで行く」「アプリ地図で見る」
   ---------------------------------------------------------------------
   自前でLeaflet地図・ルート・GPSを実装するのではなく、既存の仕組みに
   乗せることで、実際のターン・バイ・ターン案内はGoogleマップに、
   コースの位置確認は既存の map.html（クリーンマップ）に任せる方式。
   これは map.html のゴミ発見ポップアップにある「ここナビ」リンク
   （https://www.google.com/maps/dir/?api=1&destination=lat,lng）
   と同じ考え方・同じURL形式に統一している。
   ===================================================================== */

/**
 * コースの目的地情報を取得する。
 * 優先順： route最終地点(lat/lng) > latitude/longitude(lat/lng) > startAddress(住所文字列)
 * ※86コース中、緯度経度を手入力で確認済みのコースはまだ少ないため、
 *   多くは市公式データの地点名から作った住所文字列（startAddress）で
 *   Googleマップの道案内を呼び出す設計にしている（tagStatus:'estimated'）。
 */
function getCourseDestination(course){
  if(Array.isArray(course.route) && course.route.length > 0){
    const last = course.route[course.route.length - 1];
    if(typeof last.lat === 'number' && typeof last.lng === 'number'){
      return { lat:last.lat, lng:last.lng };
    }
  }
  if(typeof course.latitude === 'number' && typeof course.longitude === 'number'){
    return { lat:course.latitude, lng:course.longitude };
  }
  if(course.startAddress){
    return { address:course.startAddress };
  }
  return null;
}

/** 目的地情報(lat/lng または address)からGoogleマップ道案内URLを組み立てる */
function buildGoogleMapsDirUrl(dest){
  if(!dest) return null;
  if(typeof dest.lat === 'number' && typeof dest.lng === 'number'){
    return `https://www.google.com/maps/dir/?api=1&destination=${dest.lat},${dest.lng}&travelmode=walking`;
  }
  if(dest.address){
    return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(dest.address)}&travelmode=walking`;
  }
  return null;
}

document.getElementById('openGoogleMapsBtn').addEventListener('click', () => {
  if(!selectedCourse) return;
  const dest = getCourseDestination(selectedCourse);
  const url = buildGoogleMapsDirUrl(dest);
  if(!url){
    showToast('このコースには位置情報が登録されていません');
    return;
  }
  // map.html の「ここナビ」リンクと同一形式。現在地からの道案内はGoogleマップ側に任せる。
  window.open(url, '_blank', 'noopener');
});

document.getElementById('openAppMapBtn').addEventListener('click', () => {
  if(!selectedCourse) return;
  // 「伊勢市公式コース情報(PDF)を見る」= 診断されたコースの公式PDF（sourceUrl）を
  // 新規タブで開く。sourceUrlが無いコースはその旨をトーストで案内する。
  if(!selectedCourse.sourceUrl){
    showToast('このコースの公式コース情報は登録されていません');
    return;
  }
  window.open(selectedCourse.sourceUrl, '_blank', 'noopener');
});


/* =====================================================================
   共通ユーティリティ（XSS対策のエスケープ）
   ===================================================================== */
function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, s => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[s]));
}
function escapeAttr(str){ return escapeHtml(str); }


/* =====================================================================
   認証チェック（home.htmlと同じ方式：未ログインならlogin.htmlへ）
   ===================================================================== */
let authResolved = false;
auth.onAuthStateChanged((user) => {
  if(authResolved) return;
  authResolved = true;

  if(!user){
    window.location.href = LOGIN_PAGE;
    return;
  }
  currentUser = user;

  overlay.style.opacity = '0';
  setTimeout(() => overlay.style.display = 'none', 350);

  renderQuestion(); // 初回描画：質問1を表示
});
</script>
