<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>トレジャーシーカー伊勢 | ホーム</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  :root{
    --forest:#3E6B4F;
    --forest-deep:#2C4E3A;
    --forest-soft:#EAF3EC;
    --cream:#FBF8F0;
    --card:#FFFFFF;
    --torii:#B5502F;
    --gold:#E3A73B;
    --ink:#233127;
    --ink-soft:#7A8A7D;
    --line:#E7E2D4;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Noto Sans JP", sans-serif;
    color:var(--ink);
    background:var(--forest-soft);
    display:flex;
    justify-content:center;
  }

  .stage{
    width:100%;
    max-width:480px;
    min-height:100vh;
    min-height:100dvh;
    background:var(--cream);
    display:flex;
    flex-direction:column;
    position:relative;
  }

  /* ---------- Header ---------- */
  header{
    background:linear-gradient(155deg, var(--forest) 0%, var(--forest-deep) 100%);
    padding:calc(env(safe-area-inset-top,0px) + 18px) 20px 22px;
    border-radius:0 0 26px 26px;
    color:#fff;
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute; right:-30px; top:-30px;
    width:150px; height:150px;
    background:radial-gradient(circle, rgba(255,255,255,0.14), transparent 70%);
  }
  .header-row{display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1;}
  .header-row h1{
    font-family:"Kiwi Maru", serif;
    font-weight:500;
    font-size:20px;
    margin:0;
  }
  .header-date{font-size:12px; color:#D8E7DC; margin-top:3px;}

  .icon-btn{
    width:34px; height:34px;
    border-radius:50%;
    background:rgba(255,255,255,0.16);
    border:1px solid rgba(255,255,255,0.28);
    display:flex; align-items:center; justify-content:center;
    color:#fff;
    cursor:pointer;
  }
  .icon-btn svg{width:16px; height:16px;}

  /* ---------- Content ---------- */
  main{
    flex:1;
    padding:18px 18px 96px;
  }

  .section-label{
    font-size:12.5px;
    color:var(--ink-soft);
    font-weight:700;
    letter-spacing:.04em;
    margin:22px 2px 10px;
    display:flex; align-items:center; gap:6px;
  }
  .section-label:first-child{margin-top:0;}
  .section-label svg{width:13px; height:13px;}

  .stat-card{
    background:var(--card);
    border-radius:20px;
    padding:18px;
    margin-top:-28px;
    position:relative;
    z-index:2;
    box-shadow:0 10px 26px rgba(44,78,58,0.12);
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .stat{
    text-align:center;
    padding:10px 6px;
  }
  .stat + .stat{border-left:1px solid var(--line);}
  .stat .num{
    font-family:"Kiwi Maru", serif;
    font-size:30px;
    color:var(--forest-deep);
    line-height:1;
  }
  .stat .num.torii{color:var(--torii);}
  .stat .label{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:6px;
  }

  .rank-card{
    background:var(--card);
    border-radius:18px;
    padding:6px 6px;
    box-shadow:0 6px 18px rgba(44,78,58,0.07);
  }
  .rank-row{
    display:flex; align-items:center; gap:12px;
    padding:11px 10px;
  }
  .rank-row + .rank-row{border-top:1px solid var(--line);}
  .rank-medal{
    width:28px; height:28px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:12.5px; font-weight:700;
    flex-shrink:0;
  }
  .rank-medal.m1{background:#FCE9BE; color:#9C6B0A;}
  .rank-medal.m2{background:#E7E9EC; color:#5C6570;}
  .rank-medal.m3{background:#F1DCC9; color:#8A5327;}
  .rank-avatar{
    width:30px; height:30px; border-radius:50%; flex-shrink:0;
    object-fit:cover; background:var(--forest-soft); color:var(--forest-deep);
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; overflow:hidden;
  }
  .rank-name{flex:1; font-size:14px; font-weight:500;}
  .rank-count{font-size:13px; color:var(--forest-deep); font-weight:700;}
  .rank-empty{
    text-align:center; padding:22px 10px;
    color:var(--ink-soft); font-size:13px;
  }

  .cta-row{
    display:flex; gap:10px; margin-top:22px;
  }
  .cta{
    flex:1;
    display:flex; flex-direction:column; align-items:center; gap:8px;
    background:var(--card);
    border-radius:16px;
    padding:14px 8px 12px;
    box-shadow:0 6px 16px rgba(44,78,58,0.07);
    text-decoration:none;
    color:var(--ink);
  }
  .cta .ico{
    width:38px; height:38px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  .cta .ico svg{width:18px; height:18px;}
  .cta.find .ico{background:#FCEFE3; color:var(--torii);}
  .cta.map .ico{background:var(--forest-soft); color:var(--forest);}
  .cta span{font-size:12px; font-weight:700;}

  /* ---------- Bottom nav ---------- */
  nav.bottom{
    position:fixed;
    left:50%; transform:translateX(-50%);
    bottom:0;
    width:100%; max-width:480px;
    background:var(--card);
    border-top:1px solid var(--line);
    display:flex;
    padding:8px 6px calc(env(safe-area-inset-bottom,0px) + 8px);
    z-index:10;
  }
  nav.bottom a{
    flex:1;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    text-decoration:none;
    color:var(--ink-soft);
    font-size:10.5px;
    padding:4px 0;
  }
  nav.bottom a svg{width:20px; height:20px;}
  nav.bottom a.active{color:var(--forest-deep); font-weight:700;}
  nav.bottom a.active svg{color:var(--forest);}

  /* ---------- Loading overlay ---------- */
  .loading-overlay{
    position:fixed; inset:0; z-index:99;
    background:var(--cream);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:10px;
    transition:opacity .35s ease;
  }
  .loading-overlay .leaf{
    width:30px; height:30px;
    border:3px solid #DDE7DD;
    border-top-color:var(--forest);
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-overlay p{color:var(--ink-soft); font-size:13px; margin:0;}

  .skeleton{
    background:linear-gradient(90deg,#EFEBDF 25%,#F6F3E9 37%,#EFEBDF 63%);
    background-size:400% 100%;
    animation:sk 1.4s ease infinite;
    border-radius:8px;
  }
  @keyframes sk{0%{background-position:100% 50%;}100%{background-position:0 50%;}}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="leaf"></div>
  <p>読み込み中…</p>
</div>

<div class="stage">

  <header>
    <div class="header-row">
      <div>
        <h1 id="greeting">ホーム</h1>
        <div class="header-date" id="todayDate"></div>
      </div>
      <div class="icon-btn" id="logoutBtn" title="ログアウト">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      </div>
    </div>
  </header>

  <main>
    <div class="stat-card">
      <div class="stat">
        <div class="num skeleton" id="findsCount">&nbsp;</div>
        <div class="label">今日の発見<br>したゴミ</div>
      </div>
      <div class="stat">
        <div class="num torii skeleton" id="bulkyCount">&nbsp;</div>
        <div class="label">今日回収した<br>ゴミ</div>
      </div>
    </div>

    <div class="section-label" style="display:flex; align-items:center; justify-content:space-between;">
      <span style="display:flex; align-items:center; gap:6px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M5 6v14M19 6v14M2 3h20M7 10h10"/></svg>
        今日のランキング（トップ3）
      </span>
      <a href="ranking.html" style="color:var(--forest); font-size:12px; font-weight:700; text-decoration:none;">もっと見る</a>
    </div>
    <div class="rank-card" id="rankList">
      <div class="rank-row"><div class="skeleton" style="width:28px;height:28px;border-radius:50%;"></div><div class="skeleton" style="flex:1;height:14px;"></div></div>
      <div class="rank-row"><div class="skeleton" style="width:28px;height:28px;border-radius:50%;"></div><div class="skeleton" style="flex:1;height:14px;"></div></div>
      <div class="rank-row"><div class="skeleton" style="width:28px;height:28px;border-radius:50%;"></div><div class="skeleton" style="flex:1;height:14px;"></div></div>
    </div>

    <div class="cta-row">
      <a class="cta find" href="discover.html">
        <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></div>
        <span>発見する</span>
      </a>
      <a class="cta map" href="map.html">
        <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 20l-6-3V4l6 3 6-3 6 3v13l-6-3-6 3z"/><path d="M9 7v13M15 4v13"/></svg></div>
        <span>クリーンマップ</span>
      </a>
    </div>
  </main>

  <nav class="bottom">
    <a class="active" href="home.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      ホーム
    </a>
    <a href="map.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 20l-6-3V4l6 3 6-3 6 3v13l-6-3-6 3z"/><path d="M9 7v13M15 4v13"/></svg>
      マップ
    </a>
    <a href="discover.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      発見
    </a>
    <a href="mypage.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      マイページ
    </a>
  </nav>
</div>

<script>
/* =====================================================================
   Firebase 初期化（login.html と同じ設定を入れてください）
   ===================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyB7f8QThoqYc-iDuMhKqp3MGBRAhln9ZhI",
  authDomain: "treasure-seeker-ise.firebaseapp.com",
  projectId: "treasure-seeker-ise",
  storageBucket: "treasure-seeker-ise.firebasestorage.app",
  messagingSenderId: "278199675502",
  appId: "1:278199675502:web:295dfa975a03707f27947f"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const LOGIN_PAGE = "login.html";

const overlay      = document.getElementById('loadingOverlay');
const greeting      = document.getElementById('greeting');
const todayDateEl   = document.getElementById('todayDate');
const findsCountEl  = document.getElementById('findsCount');
const bulkyCountEl  = document.getElementById('bulkyCount');
const rankListEl    = document.getElementById('rankList');
const logoutBtn     = document.getElementById('logoutBtn');

function formatToday(){
  const d = new Date();
  const w = ['日','月','火','水','木','金','土'][d.getDay()];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w}）`;
}
todayDateEl.textContent = formatToday();

function startOfToday(){
  const d = new Date();
  d.setHours(0,0,0,0);
  return firebase.firestore.Timestamp.fromDate(d);
}

/* ---------------------------------------------------------------------
   今日の発見数 / 回収した大型ゴミ数、および今日のランキングを取得する。

   ※ 実際の Firestore スキーマに合わせて調整してください。
     ここでは下記を想定した参考実装です:
       collection: "reports"
       fields: {
         category:    string  例) "ゴミ" | "大型ゴミ" | "空き缶" など
         isBulky:     boolean 大型ゴミかどうか（category と併用可）
         createdAt:   Timestamp
         displayName: string  投稿者のニックネーム / チーム名
       }
   --------------------------------------------------------------------- */
async function loadTodayStats(){
  try{
    const todayStart = startOfToday();
    const snap = await db.collection('reports')
      .where('createdAt', '>=', todayStart)
      .get();

    let findsTotal = 0;
    let bulkyTotal = 0;
    const byUser = {}; // key: uid（無ければ表示名）→ { name, count, uid }

    snap.forEach(doc => {
      const d = doc.data();
      findsTotal += 1;
      if(d.isBulky === true || d.category === '大型ゴミ'){
        bulkyTotal += 1;
      }
      const name = d.displayName || '名無しの発見者';
      const key = d.uid || name; // uid が無い投稿（ゲスト等）は名前でまとめる
      if(!byUser[key]){
        byUser[key] = { name, count:0, uid: d.uid || null };
      }
      byUser[key].count += 1;
    });

    findsCountEl.classList.remove('skeleton');
    bulkyCountEl.classList.remove('skeleton');
    findsCountEl.textContent = findsTotal.toLocaleString();
    bulkyCountEl.textContent = bulkyTotal.toLocaleString();

    await renderRanking(byUser);
  }catch(err){
    console.error('今日の統計の取得に失敗しました', err);
    findsCountEl.classList.remove('skeleton');
    bulkyCountEl.classList.remove('skeleton');
    findsCountEl.textContent = '—';
    bulkyCountEl.textContent = '—';
    rankListEl.innerHTML = '<div class="rank-empty">ランキングを取得できませんでした</div>';
  }
}

async function renderRanking(byUser){
  const sorted = Object.values(byUser)
    .sort((a,b) => b.count - a.count)
    .slice(0,3);

  if(sorted.length === 0){
    rankListEl.innerHTML = '<div class="rank-empty">今日はまだ発見の報告がありません</div>';
    return;
  }

  // 上位3名分だけ、プロフィール写真(photoURL)を users コレクションから取得する
  const withPhoto = await Promise.all(sorted.map(async (entry) => {
    if(!entry.uid) return { ...entry, photoURL:null };
    try{
      const doc = await db.collection('users').doc(entry.uid).get();
      const photoURL = doc.exists ? (doc.data().photoURL || null) : null;
      return { ...entry, photoURL };
    }catch(e){
      console.warn('プロフィール写真の取得に失敗しました', e);
      return { ...entry, photoURL:null };
    }
  }));

  const medalClasses = ['m1','m2','m3'];
  rankListEl.innerHTML = withPhoto.map((entry, i) => {
    const initial = escapeHtml((entry.name || '？').trim().charAt(0).toUpperCase() || '？');
    const avatar = entry.photoURL
      ? `<img class="rank-avatar" src="${escapeHtml(entry.photoURL)}" alt="" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'rank-avatar',textContent:'${initial}'}))">`
      : `<div class="rank-avatar">${initial}</div>`;
    return `
    <div class="rank-row">
      <div class="rank-medal ${medalClasses[i]}">${i+1}</div>
      ${avatar}
      <div class="rank-name">${escapeHtml(entry.name)}</div>
      <div class="rank-count">${entry.count.toLocaleString()}個</div>
    </div>
  `;
  }).join('');
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[s]));
}

logoutBtn.addEventListener('click', async () => {
  if(!confirm('ログアウトしますか？')) return;
  await auth.signOut();
  window.location.href = LOGIN_PAGE;
});

/* 未ログインなら login.html へリダイレクト。
   ログイン済みならユーザー名を表示し、今日の統計を読み込む。 */
let resolved = false;
auth.onAuthStateChanged(async (user) => {
  if(resolved) return;
  resolved = true;

  if(!user){
    window.location.href = LOGIN_PAGE;
    return;
  }

  try{
    const snap = await db.collection('users').doc(user.uid).get();
    const data = snap.exists ? snap.data() : null;
    if(data && data.displayName){
      greeting.textContent = `おかえりなさい、${data.displayName}さん`;
    }
  }catch(e){
    console.warn('ユーザー情報の取得に失敗しました', e);
  }

  overlay.style.opacity = '0';
  setTimeout(() => overlay.style.display = 'none', 350);

  loadTodayStats();
});
</script>
</body>
</html>
