<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ホーム - トレジャーシーカー伊勢</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#1E3A5F" />
<link rel="stylesheet" href="shared/style.css" />
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <h1>🏠 ホーム<br /><span class="small-note" style="font-weight:400;">伊勢の街をピカピカに</span></h1>
    <a href="mypage.html" class="header-icon-btn">👤</a>
  </header>

  <main class="app-main">

    <div class="card">
      <p class="card-title">📅 今日の状況</p>
      <div class="stat-grid">
        <div class="stat-box">
          <div class="label">発見したゴミの個数</div>
          <div class="value" id="stat-finds">-<small>個</small></div>
        </div>
        <div class="stat-box">
          <div class="label">回収した大型ゴミ</div>
          <div class="value" id="stat-large">-<small>個</small></div>
        </div>
      </div>
    </div>

    <div class="card">
      <p class="card-title">🏅 今日の発見数：トップユーザー</p>
      <div id="ranking-list">
        <div class="empty-state"><div class="icon">⏳</div>読み込み中…</div>
      </div>
      <div style="margin-top:12px;">
        <a href="ranking.html"><button class="btn btn-gold">🏆 全体ランキングを見る</button></a>
      </div>
    </div>

    <p class="card-title" style="margin: 6px 2px 10px;">できること</p>
    <div class="feature-grid">
      <a href="map.html#add">
        <div class="feature-btn">
          <span class="icon">🤖</span>
          AIかんたんゴミ分別
          <span class="badge">新UI</span>
        </div>
      </a>
      <a href="ranking.html">
        <div class="feature-btn">
          <span class="icon">📊</span>
          地域別環境ランキング
        </div>
      </a>
      <a href="mypage.html">
        <div class="feature-btn">
          <span class="icon">🌱</span>
          マイページ＆環境貢献度
        </div>
      </a>
      <a href="mypage.html#history">
        <div class="feature-btn">
          <span class="icon">♻️</span>
          資源回収履歴
        </div>
      </a>
    </div>

  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="shared/firebase-config.js"></script>
<script src="shared/app-common.js"></script>
<script>
  renderBottomNav("home");

  let unsubToday = null;

  requireAuth((user) => {
    listenTodayStats();
  });

  function medalClass(i) {
    if (i === 0) return "gold";
    if (i === 1) return "silver";
    if (i === 2) return "bronze";
    return "plain";
  }

  function listenTodayStats() {
    if (unsubToday) unsubToday();
    // 今日の発見のみを軽量に監視（全件監視によるパフォーマンス問題を避けるため範囲を限定）
    unsubToday = db
      .collection("finds")
      .where("createdAt", ">=", startOfToday())
      .onSnapshot(
        (snap) => {
          let total = 0;
          let large = 0;
          const byUser = {};

          snap.forEach((doc) => {
            const d = doc.data();
            total++;
            if (d.size === "large") large++;
            const key = d.uid;
            if (!byUser[key]) {
              byUser[key] = { name: d.nickname || "冒険者", count: 0 };
            }
            byUser[key].count++;
          });

          document.getElementById("stat-finds").innerHTML = `${total}<small>個</small>`;
          document.getElementById("stat-large").innerHTML = `${large}<small>個</small>`;

          const ranked = Object.values(byUser)
            .sort((a, b) => b.count - a.count)
            .slice(0, 4);

          const listEl = document.getElementById("ranking-list");
          if (ranked.length === 0) {
            listEl.innerHTML = `<div class="empty-state"><div class="icon">🔍</div>今日はまだ発見がありません。<br/>最初の発見者になりましょう！</div>`;
            return;
          }
          listEl.innerHTML = ranked
            .map(
              (u, i) => `
            <div class="rank-row">
              <div class="rank-medal ${medalClass(i)}">${i + 1}</div>
              <div class="rank-avatar">${u.name.charAt(0)}</div>
              <div class="rank-name">${u.name}</div>
              <div class="rank-score">${u.count}<small>個</small></div>
            </div>`
            )
            .join("");
        },
        (err) => {
          console.error(err);
          showToast("データの取得に失敗しました");
        }
      );
  }
</script>
</body>
</html>
