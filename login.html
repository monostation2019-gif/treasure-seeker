<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>トレジャーシーカー伊勢 - ログイン</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#1E3A5F" />
<link rel="stylesheet" href="shared/style.css" />
</head>
<body>
<div class="app-shell">

  <div class="login-hero">
    <div class="torii">⛩️🔍🍃</div>
    <h1>伊勢の未来をピカピカに</h1>
    <p>トレジャーシーカー伊勢 - 発見と資源の冒険 -</p>
  </div>

  <div id="login-error" class="login-error"></div>

  <div class="login-actions">
    <button id="btn-google" class="btn btn-google">
      <span>🔎</span> Googleでログイン
    </button>
    <button id="btn-apple" class="btn btn-apple">
      <span></span> Appleでログイン
    </button>
    <button id="btn-guest" class="btn btn-guest">
      <span>🧭</span> ゲストとしてはじめる
    </button>
  </div>

  <p class="login-footnote">
    ログインすることで、発見したゴミの記録や地域ランキングへの参加が可能になります。<br />
    ゲストログインでもすべての機能を利用できますが、記録は端末を変えると引き継がれません。
  </p>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="shared/firebase-config.js"></script>
<script src="shared/app-common.js"></script>
<script>
  // すでにログイン済みならホームへ即リダイレクト
  auth.onAuthStateChanged((user) => {
    if (user) window.location.href = "home.html";
  });

  function showError(msg) {
    const el = document.getElementById("login-error");
    el.textContent = msg;
    el.classList.add("show");
  }
  function clearError() {
    document.getElementById("login-error").classList.remove("show");
  }

  async function ensureUserDoc(user, provider) {
    const ref = db.collection("users").doc(user.uid);
    const snap = await ref.get();
    if (!snap.exists) {
      await ref.set({
        displayName: user.displayName || "ゲスト冒険者",
        photoURL: user.photoURL || null,
        provider,
        isGuest: provider === "guest",
        totalFinds: 0,
        totalLargeItems: 0,
        contributionScore: 0,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    }
  }

  async function withLoading(btn, fn) {
    clearError();
    btn.classList.add("loading");
    try {
      await fn();
      window.location.href = "home.html";
    } catch (e) {
      console.error(e);
      if (e.code === "auth/popup-closed-by-user") {
        // ユーザーが自分で閉じただけなのでエラー表示しない
      } else if (e.code === "auth/account-exists-with-different-credential") {
        showError("同じメールアドレスで別のログイン方法がすでに使われています。");
      } else {
        showError("ログインに失敗しました。通信環境をご確認のうえ、もう一度お試しください。");
      }
    } finally {
      btn.classList.remove("loading");
    }
  }

  document.getElementById("btn-google").addEventListener("click", (e) => {
    withLoading(e.currentTarget, async () => {
      const result = await auth.signInWithPopup(googleProvider);
      await ensureUserDoc(result.user, "google");
    });
  });

  document.getElementById("btn-apple").addEventListener("click", (e) => {
    withLoading(e.currentTarget, async () => {
      const result = await auth.signInWithPopup(appleProvider);
      await ensureUserDoc(result.user, "apple");
    });
  });

  document.getElementById("btn-guest").addEventListener("click", (e) => {
    withLoading(e.currentTarget, async () => {
      const result = await auth.signInAnonymously();
      await ensureUserDoc(result.user, "guest");
    });
  });
</script>
</body>
</html>
