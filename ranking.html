<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ランキング - トレジャーシーカー伊勢</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#1E3A5F" />
<link rel="stylesheet" href="shared/style.css" />
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <a href="home.html" class="back-btn">←</a>
    <h1>🏆 地域別環境ランキング</h1>
  </header>

  <main class="app-main">

    <div class="toggle-tabs">
      <div class="tab active" data-range="today">今日</div>
      <div class="tab" data-range="all">累計</div>
    </div>

    <div class="card">
      <p class="card-title">👤 ユーザーランキング</p>
      <div id="user-ranking">
        <div class="empty-state"><div class="icon">⏳</div>読み込み中…</div>
      </div>
    </div>

    <div class="card">
      <p class="card-title">🏘️ 町別ランキング</p>
      <div id="town-ranking">
        <div class="empty-state"><div class="icon">⏳</div>読み込み中…</div>
      </div>
    </div>

  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="shared/firebase-config.js"></script>
<script src="shared/app-common.js"></script>
<script>
  renderBottomNav("ranking");

  let currentRange = "today";
  let unsub = null;

  requireAuth(() => {
    document.querySelectorAll(".toggle-tabs .tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".toggle-tabs .tab").forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        currentRange = tab.dataset.range;
        listen();
      });
    });
    listen();
  });

  function medalClass(i) {
    if (i === 0) return "gold";
    if (i === 1) return "silver";
    if (i === 2) return "bronze";
    return "plain";
  }

  function renderList(elId, rows, unit) {
    const el = document.getElementById(elId);
    if (rows.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="icon">🔍</div>まだデータがありません</div>`;
      return;
    }
    el.innerHTML = rows
      .map(
        (r, i) => `
      <div class="rank-row">
        <div class="rank-medal ${medalClass(i)}">${i + 1}</div>
        <div class="rank-avatar">${r.name.charAt(0)}</div>
        <div class="rank-name">${r.name}</div>
        <div class="rank-score">${r.count}<small>${unit}</small></div>
      </div>`
      )
      .join("");
  }

  function listen() {
    if (unsub) unsub();

    if (currentRange === "today") {
      unsub = db
        .collection("finds")
        .where("createdAt", ">=", startOfToday())
        .onSnapshot(renderFromSnapshot, (e) => console.error(e));
    } else {
      // 累計はusersコレクションの集計値を利用（finds全件走査を避けるため）
      unsub = db
        .collection("users")
        .orderBy("totalFinds", "desc")
        .limit(50)
        .onSnapshot((snap) => {
          const users = snap.docs.map((d) => ({ name: d.data().displayName || "冒険者", count: d.data().totalFinds || 0 }));
          renderList("user-ranking", users.slice(0, 20), "個");
          // 累計の町別ランキングはfinds監視が必要ないため、直近データがある場合のみ表示
          renderList("town-ranking", [], "個");
          document.getElementById("town-ranking").innerHTML =
            `<div class="empty-state"><div class="icon">🏘️</div>町別の累計ランキングは今日タブでご確認いただけます</div>`;
        }, (e) => console.error(e));
    }
  }

  function renderFromSnapshot(snap) {
    const byUser = {};
    const byTown = {};
    snap.forEach((doc) => {
      const d = doc.data();
      const uKey = d.uid;
      if (!byUser[uKey]) byUser[uKey] = { name: d.nickname || "冒険者", count: 0 };
      byUser[uKey].count++;

      const tKey = d.town || "不明";
      if (!byTown[tKey]) byTown[tKey] = { name: tKey, count: 0 };
      byTown[tKey].count++;
    });

    renderList(
      "user-ranking",
      Object.values(byUser).sort((a, b) => b.count - a.count).slice(0, 20),
      "個"
    );
    renderList(
      "town-ranking",
      Object.values(byTown).sort((a, b) => b.count - a.count).slice(0, 20),
      "個"
    );
  }
</script>
</body>
</html>
