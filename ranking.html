<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>トレジャーシーカー伊勢 | ランキング</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  :root{
    --forest:#3E6B4F; --forest-deep:#2C4E3A; --forest-soft:#EAF3EC;
    --cream:#FBF8F0; --card:#FFFFFF; --torii:#B5502F; --gold:#E3A73B;
    --ink:#233127; --ink-soft:#7A8A7D; --line:#E7E2D4;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0;}
  body{font-family:"Noto Sans JP", sans-serif; color:var(--ink); background:var(--forest-soft); display:flex; justify-content:center;}

  .stage{width:100%; max-width:480px; min-height:100vh; min-height:100dvh; background:var(--cream); display:flex; flex-direction:column; position:relative;}

  header{
    background:linear-gradient(155deg, var(--forest) 0%, var(--forest-deep) 100%);
    padding:calc(env(safe-area-inset-top,0px) + 16px) 18px 16px;
    color:#fff; border-radius:0 0 22px 22px;
  }
  header h1{font-family:"Kiwi Maru", serif; font-weight:500; font-size:19px; margin:0 0 12px;}

  .scope-tabs{display:flex; background:rgba(255,255,255,0.14); border-radius:12px; padding:4px; gap:4px;}
  .scope-tabs button{
    flex:1; border:none; background:transparent; color:#E7EFE7;
    font-size:12px; font-weight:700; padding:8px 4px; border-radius:9px; cursor:pointer;
  }
  .scope-tabs button.active{background:#fff; color:var(--forest-deep);}

  main{flex:1; padding:16px 16px 30px;}

  .period-toggle{display:flex; gap:8px; margin-bottom:6px;}
  .period-toggle button{
    flex:1; padding:9px; border-radius:12px; border:1.5px solid var(--line);
    background:var(--card); color:var(--ink-soft); font-size:13px; font-weight:700; cursor:pointer;
  }
  .period-toggle button.active{background:var(--forest-soft); border-color:var(--forest); color:var(--forest-deep);}

  .period-range{text-align:center; font-size:12px; color:var(--ink-soft); margin-bottom:14px;}

  .rank-card{background:var(--card); border-radius:18px; padding:6px; box-shadow:0 6px 18px rgba(44,78,58,0.07); min-height:120px;}
  .rank-row{display:flex; align-items:center; gap:12px; padding:13px 12px;}
  .rank-row + .rank-row{border-top:1px solid var(--line);}
  .rank-medal{
    width:32px; height:32px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:13.5px; font-weight:900; flex-shrink:0;
  }
  .rank-medal.m1{background:#FCE9BE; color:#9C6B0A;}
  .rank-medal.m2{background:#E7E9EC; color:#5C6570;}
  .rank-medal.m3{background:#F1DCC9; color:#8A5327;}
  .rank-medal.mn{background:var(--forest-soft); color:var(--forest-deep); font-size:12px;}
  .rank-name{flex:1; font-size:14.5px; font-weight:500;}
  .rank-count{font-size:13.5px; color:var(--forest-deep); font-weight:700;}

  .rank-avatar{
    width:32px; height:32px; border-radius:50%; flex-shrink:0;
    object-fit:cover; background:var(--forest-soft); color:var(--forest-deep);
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; overflow:hidden;
  }
  .rank-row.tappable{cursor:pointer;}
  .rank-row.tappable:active{background:var(--forest-soft);}

  .like-btn{
    display:flex; align-items:center; gap:4px; flex-shrink:0;
    border:1.5px solid var(--line); background:var(--card); color:var(--ink-soft);
    border-radius:999px; padding:6px 11px; font-size:12.5px; font-weight:700;
    cursor:pointer; transition:background .15s ease, border-color .15s ease, color .15s ease, transform .1s ease;
  }
  .like-btn svg{width:15px; height:15px; fill:none; stroke:currentColor; stroke-width:2;}
  .like-btn.liked{background:#FBEAE6; border-color:var(--torii); color:var(--torii);}
  .like-btn.liked svg{fill:var(--torii); stroke:var(--torii);}
  .like-btn:active{transform:scale(0.94);}
  .like-btn:disabled{opacity:0.6; cursor:default;}

  .user-detail-overlay{
    position:fixed; inset:0; z-index:1000; background:rgba(20,28,20,0.55);
    display:none; align-items:center; justify-content:center; padding:24px;
  }
  .user-detail-overlay.show{display:flex;}
  .user-detail-card{
    background:#fff; border-radius:22px; padding:28px 22px 22px; text-align:center;
    max-width:320px; width:100%; position:relative;
  }
  .user-detail-close{
    position:absolute; top:12px; right:12px; width:28px; height:28px; border-radius:50%;
    border:none; background:var(--forest-soft); color:var(--forest-deep);
    display:flex; align-items:center; justify-content:center; font-size:16px; cursor:pointer; line-height:1;
  }
  .user-detail-rank{
    display:inline-flex; align-items:center; justify-content:center;
    width:34px; height:34px; border-radius:50%; font-weight:900; font-size:14px;
    background:var(--forest-soft); color:var(--forest-deep); margin:0 auto 12px;
  }
  .user-detail-avatar{
    width:64px; height:64px; border-radius:50%; margin:0 auto 12px; overflow:hidden;
    background:var(--forest-soft); color:var(--forest-deep);
    display:flex; align-items:center; justify-content:center;
    font-size:24px; font-weight:700;
  }
  .user-detail-avatar img{width:100%; height:100%; object-fit:cover;}
  .user-detail-name{font-family:"Kiwi Maru", serif; font-weight:500; font-size:16px; color:var(--forest-deep); margin-bottom:8px;}
  .user-detail-bio{font-size:12.5px; color:var(--ink-soft); line-height:1.6; white-space:pre-wrap;}

  .rank-empty{text-align:center; padding:34px 14px; color:var(--ink-soft); font-size:13px; line-height:1.7;}
  .rank-empty svg{width:28px; height:28px; margin-bottom:8px; color:var(--line);}

  .rank-row-extra{display:none;}
  .rank-more-btn{
    display:none; width:100%; margin-top:10px; padding:11px; border-radius:14px;
    border:1.5px solid var(--line); background:var(--card); color:var(--forest-deep);
    font-size:13px; font-weight:700; cursor:pointer;
  }
  .rank-more-btn:active{background:var(--forest-soft);}

  .scroll-top-wrap{
    position:fixed; left:50%; transform:translateX(-50%);
    bottom:calc(78px + env(safe-area-inset-bottom,0px));
    width:100%; max-width:480px; display:flex; justify-content:flex-end; padding-right:16px;
    pointer-events:none; z-index:20; opacity:0; visibility:hidden; transition:opacity .2s ease;
  }
  .scroll-top-wrap.show{opacity:1; visibility:visible;}
  .scroll-top-btn{
    pointer-events:auto; width:38px; height:38px; border-radius:50%; border:none;
    background:var(--forest); color:#fff; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 12px rgba(44,78,58,0.3); cursor:pointer;
  }
  .scroll-top-btn svg{width:18px; height:18px;}

  .skeleton-row{display:flex; align-items:center; gap:12px; padding:13px 12px;}
  .sk{background:linear-gradient(90deg,#EFEBDF 25%,#F6F3E9 37%,#EFEBDF 63%); background-size:400% 100%; animation:sk 1.4s ease infinite; border-radius:8px;}
  @keyframes sk{0%{background-position:100% 50%;}100%{background-position:0 50%;}}

  nav.bottom{
    position:fixed; left:50%; transform:translateX(-50%); bottom:0;
    width:100%; max-width:480px; background:var(--card);
    border-top:1px solid var(--line); display:flex;
    padding:8px 6px calc(env(safe-area-inset-bottom,0px) + 8px); z-index:10;
  }
  nav.bottom a{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; text-decoration:none; color:var(--ink-soft); font-size:10.5px; padding:4px 0;}
  nav.bottom a svg{width:20px; height:20px;}
  nav.bottom a.active{color:var(--forest-deep); font-weight:700;}
  nav.bottom a.active svg{color:var(--forest);}

  .loading-overlay{position:fixed; inset:0; z-index:99; background:var(--cream); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; transition:opacity .35s ease;}
  .loading-overlay .leaf{width:30px; height:30px; border:3px solid #DDE7DD; border-top-color:var(--forest); border-radius:50%; animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-overlay p{color:var(--ink-soft); font-size:13px; margin:0;}

  main .back-link{display:inline-flex; align-items:center; gap:5px; font-size:12.5px; color:var(--ink-soft); text-decoration:none; margin-bottom:14px;}
  main .back-link svg{width:14px; height:14px;}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="leaf"></div>
  <p>読み込み中…</p>
</div>

<div class="stage">
  <header>
    <h1>ランキング</h1>
    <div class="scope-tabs" id="scopeTabs">
      <button class="active" data-scope="town">ヒートマップ</button>
      <button data-scope="gourmet">グルメ</button>
      <button data-scope="history">歴史・文化</button>
      <button data-scope="recommend">おすすめ</button>
      <button data-scope="user">ユーザー</button>
    </div>
  </header>

  <main>
    <a class="back-link" href="home.html">

      ホームに戻る
    </a>

    <div class="period-toggle">
      <button class="active" data-period="week">週間</button>
      <button data-period="month">月間</button>
      <button data-period="all">累計</button>
    </div>
    <div class="period-range" id="periodRange"></div>

    <div class="rank-card" id="rankCard">
      <div class="skeleton-row"><div class="sk" style="width:32px;height:32px;border-radius:50%;"></div><div class="sk" style="flex:1;height:14px;"></div></div>
      <div class="skeleton-row"><div class="sk" style="width:32px;height:32px;border-radius:50%;"></div><div class="sk" style="flex:1;height:14px;"></div></div>
      <div class="skeleton-row"><div class="sk" style="width:32px;height:32px;border-radius:50%;"></div><div class="sk" style="flex:1;height:14px;"></div></div>

    <button class="rank-more-btn" id="rankMoreBtn">もっと見る</button>

  <div class="scroll-top-wrap" id="scrollTopWrap">

    <div class="user-detail-card">

      <div class="user-detail-rank" id="userDetailRank"></div>
      <div class="user-detail-avatar" id="userDetailAvatar"></div>
      <div class="user-detail-name" id="userDetailName"></div>
      <div class="user-detail-bio" id="userDetailBio"></div>

  <nav class="bottom">
    <a href="home.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>

    </a>
    <a href="map.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 20l-6-3V4l6 3 6-3 6 3v13l-6-3-6 3z"/><path d="M9 7v13M15 4v13"/></svg>
      マップ
    </a>
    <a href="discover.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      発見
    </a>
    <a href="mypage.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      マイページ
    </a>
  </nav>
</div>

<script>
/* =====================================================================
   Firebase 初期化（他ページと同じ設定にしてください）
   ===================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyB7f8QThoqYc-iDuMhKqp3MGBRAhln9ZhI",
  authDomain: "treasure-seeker-ise.firebaseapp.com",
  projectId: "treasure-seeker-ise",
  storageBucket: "treasure-seeker-ise.firebasestorage.app",
  messagingSenderId: "278199675502",
  appId: "1:278199675502:web:295dfa975a03707f27947f"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const LOGIN_PAGE = "login.html";

const overlay      = document.getElementById('loadingOverlay');
const rankCard     = document.getElementById('rankCard');
const scopeTabs    = document.getElementById('scopeTabs');
const periodToggle = document.querySelector('.period-toggle');
const periodRangeEl = document.getElementById('periodRange');
const rankMoreBtn   = document.getElementById('rankMoreBtn');
const scrollTopWrap = document.getElementById('scrollTopWrap');
const scrollTopBtn  = document.getElementById('scrollTopBtn');

const userDetailOverlay = document.getElementById('userDetailOverlay');
const userDetailClose   = document.getElementById('userDetailClose');
const userDetailRank    = document.getElementById('userDetailRank');
const userDetailAvatar  = document.getElementById('userDetailAvatar');
const userDetailName    = document.getElementById('userDetailName');
const userDetailBio     = document.getElementById('userDetailBio');

let currentUser = null;
let currentScope = 'town';   // town(ヒートマップ) / gourmet(グルメ) / history(歴史・文化) / recommend(おすすめ) / user
let currentPeriod = 'week'; // week / month / all（累計＝今年）

/* グルメ・歴史文化・おすすめタブは、reports の category フィールドの値で絞り込む
   （地図・発見ページ側のカテゴリ表記と完全一致させる必要がある） */
const CATEGORY_SCOPES = {
  gourmet: 'グルメ',
  history: '歴史・文化',
  recommend: 'おすすめ'
};
const CATEGORY_EMOJI = { 'グルメ':'🍴', '歴史・文化':'🏯', 'おすすめ':'⭐' };

let currentCategoryItems = [];   // グルメ/歴史文化/おすすめ表示中に、いいね操作の対象を保持しておくキャッシュ
let currentCategoryLabel = '';   // 表示中のカテゴリ名（絵文字表示用）

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

/* グルメ/歴史文化/おすすめの並び替え：いいね数が多い順。
   いいね数が同数（初期状態は全員0）の場合は50音順で並べる。 */
const jaCollator = new Intl.Collator('ja');
function sortCategoryItems(items){
  return items.slice().sort((a, b) => {
    if(b.likeCount !== a.likeCount) return b.likeCount - a.likeCount;
    return jaCollator.compare(a.name, b.name);
  });
}

/* 各期間の開始日（Dateオブジェクト）を計算する。
   週間：日曜始まり〜土曜終わり。月間・累計（今年）は、次の週/月/年をまたいだ時点で
   自動的に新しい期間に切り替わる（＝現在時刻を基準に毎回計算し直しているだけ）。 */
function startOfWeekDate(){
  const d = new Date();
  d.setDate(d.getDate() - d.getDay()); // d.getDay(): 0=日,1=月,...6=土 → 日曜まで戻す
  d.setHours(0,0,0,0);
  return d;
}
function startOfMonthDate(){
  const d = new Date();
  d.setDate(1);
  d.setHours(0,0,0,0);
  return d;
}
function startOfYearDate(){
  const d = new Date();
  d.setMonth(0, 1);
  d.setHours(0,0,0,0);
  return d;
}
function startOfWeek(){ return firebase.firestore.Timestamp.fromDate(startOfWeekDate()); }
function startOfMonth(){ return firebase.firestore.Timestamp.fromDate(startOfMonthDate()); }
function startOfYear(){ return firebase.firestore.Timestamp.fromDate(startOfYearDate()); }

/* 期間トグルの下に「7月19日〜7月25日」「2026年7月」「2026年」のように
   現在選択中の期間の範囲を表示する。 */
function updatePeriodRangeLabel(){
  const now = new Date();
  let text = '';
  if(currentPeriod === 'week'){
    const start = startOfWeekDate();
    const end = new Date(start);
    end.setDate(end.getDate() + 6); // 土曜日
    text = `${start.getMonth()+1}月${start.getDate()}日〜${end.getMonth()+1}月${end.getDate()}日`;
  }else if(currentPeriod === 'month'){
    text = `${now.getFullYear()}年${now.getMonth()+1}月`;
  }else{
    text = `${now.getFullYear()}年`;
  }
  periodRangeEl.textContent = text;
}

/* ---------------------------------------------------------------------
   ランキング取得。
   ・town（ヒートマップ）：reports の town フィールドで集計し、地域ごとの
     発見件数（＝ゴミの多さ）でランキングする（従来と同じ挙動）。
   ・gourmet / history / recommend：category が一致する発見を1件ずつ
     ランキング表示する（集計しない）。初期は50音順、いいねが付けば
     いいね数の多い順に並び替わる。
   --------------------------------------------------------------------- */
async function loadRanking(){
  updatePeriodRangeLabel();
  rankCard.innerHTML = `
    <div class="skeleton-row"><div class="sk" style="width:32px;height:32px;border-radius:50%;"></div><div class="sk" style="flex:1;height:14px;"></div></div>
    <div class="skeleton-row"><div class="sk" style="width:32px;height:32px;border-radius:50%;"></div><div class="sk" style="flex:1;height:14px;"></div></div>
    <div class="skeleton-row"><div class="sk" style="width:32px;height:32px;border-radius:50%;"></div><div class="sk" style="flex:1;height:14px;"></div></div>`;

  try{
    let query = db.collection('reports').limit(2000);
    if(currentPeriod === 'week'){
      query = query.where('createdAt', '>=', startOfWeek());
    }else if(currentPeriod === 'month'){
      query = query.where('createdAt', '>=', startOfMonth());
    }else{
      // 累計＝今年の範囲。年をまたぐと自動的に新しい年のデータにリセットされる
      query = query.where('createdAt', '>=', startOfYear());
    }
    const snap = await query.get();

    if(currentScope === 'user'){
      // ユーザー別は uid で集計する（uid が無いゲスト投稿は表示名でまとめる）
      const byUser = {};
      snap.forEach(doc => {
        const d = doc.data();
        const name = d.displayName || '名無しの発見者';
        const key = d.uid || name;
        if(!byUser[key]){
          byUser[key] = { name, count:0, uid: d.uid || null };
        }
        byUser[key].count += 1;
      });
      const sortedUsers = Object.values(byUser).sort((a,b) => b.count - a.count);
      await renderUserRanking(sortedUsers);
      return;
    }

    if(CATEGORY_SCOPES[currentScope]){
      // グルメ／歴史・文化／おすすめ：category が一致する発見を1件ずつ並べる
      const targetCategory = CATEGORY_SCOPES[currentScope];
      const items = [];
      snap.forEach(doc => {
        const d = doc.data();
        if(d.category !== targetCategory) return;
        const likedBy = Array.isArray(d.likedBy) ? d.likedBy : [];
        items.push({
          id: doc.id,
          name: (d.memo && d.memo.trim()) ? d.memo.trim() : (d.town ? d.town : '名称未設定'),
          likedBy,
          likeCount: likedBy.length
        });
      });
      renderCategoryRanking(items, targetCategory);
      return;
    }

    // ヒートマップ（地域別＝town フィールドで集計）
    const counts = {};
    snap.forEach(doc => {
      const d = doc.data();
      const key = d.town;
      if(!key) return;
      counts[key] = (counts[key] || 0) + 1;
    });

    const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
    renderRanking(sorted);
  }catch(err){
    console.error('ランキングの取得に失敗しました', err);
    rankCard.innerHTML = `
      <div class="rank-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 9v4M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg>
        ランキングを取得できませんでした
      </div>`;
  }
}

function renderRanking(sorted){
  if(sorted.length === 0){
    rankCard.innerHTML = `
      <div class="rank-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 6h18M5 6v14M19 6v14M2 3h20M7 10h10"/></svg>
        まだこの区分のデータがありません
      </div>`;
    setupMoreButton(0);
    return;
  }

  rankCard.innerHTML = sorted.map(([name, count], i) => {
    const medalClass = i === 0 ? 'm1' : i === 1 ? 'm2' : i === 2 ? 'm3' : 'mn';
    const extraClass = i >= 5 ? ' rank-row-extra' : '';
    return `
      <div class="rank-row${extraClass}">
        <div class="rank-medal ${medalClass}">${i+1}</div>
        <div class="rank-name">${escapeHtml(name)}</div>
        <div class="rank-count">${count.toLocaleString()}個</div>
      </div>`;
  }).join('');

  setupMoreButton(sorted.length);
}

/* グルメ／歴史・文化／おすすめ：1件ずつのランキング（いいね数→50音順） */
function renderCategoryRanking(items, categoryLabel){
  currentCategoryLabel = categoryLabel;
  currentCategoryItems = sortCategoryItems(items);
  renderCategoryRankingList();
}

/* currentCategoryItems の現在の並び順のまま再描画する（いいね操作の楽観的更新用） */
function renderCategoryRankingList(){
  if(currentCategoryItems.length === 0){
    rankCard.innerHTML = `
      <div class="rank-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 6h18M5 6v14M19 6v14M2 3h20M7 10h10"/></svg>
        まだこの区分のデータがありません
      </div>`;
    setupMoreButton(0);
    return;
  }

  const emoji = CATEGORY_EMOJI[currentCategoryLabel] || '⭐';
  const medalClasses = ['m1','m2','m3'];
  rankCard.innerHTML = currentCategoryItems.map((item, i) => {
    const medalClass = medalClasses[i] || 'mn';
    const extraClass = i >= 5 ? ' rank-row-extra' : '';
    const liked = !!(currentUser && item.likedBy.includes(currentUser.uid));
    return `
      <div class="rank-row${extraClass}">
        <div class="rank-medal ${medalClass}">${i+1}</div>
        <div class="rank-name">${emoji} ${escapeHtml(item.name)}</div>
        <button class="like-btn${liked ? ' liked' : ''}" data-id="${item.id}" type="button">
          <svg viewBox="0 0 24 24"><path d="M12 21s-7.2-4.4-9.6-8.9C.6 8.4 2.2 4.5 6 4.5c2 0 3.4 1 4.5 2.3C11.6 5.5 13 4.5 15 4.5c3.8 0 5.4 3.9 3.6 7.6C19.2 16.6 12 21 12 21z"/></svg>
          <span class="like-count">${item.likeCount}</span>
        </button>
      </div>`;
  }).join('');

  setupMoreButton(currentCategoryItems.length);
}

/* いいねの付け外し（自分1人につき1回まで、押すたびにON/OFFを切り替える） */
async function toggleLike(reportId, btnEl){
  if(!currentUser) return;
  const item = currentCategoryItems.find(x => x.id === reportId);
  if(!item) return;

  const alreadyLiked = item.likedBy.includes(currentUser.uid);
  btnEl.disabled = true;

  // 楽観的更新：先に画面を更新し、失敗したら元に戻す
  applyLikeChange(item, !alreadyLiked);
  currentCategoryItems = sortCategoryItems(currentCategoryItems);
  renderCategoryRankingList();

  try{
    await db.collection('reports').doc(reportId).update({
      likedBy: alreadyLiked
        ? firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
        : firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
    });
  }catch(err){
    console.error('いいねの更新に失敗しました', err);
    applyLikeChange(item, alreadyLiked); // 元の状態に戻す
    currentCategoryItems = sortCategoryItems(currentCategoryItems);
    renderCategoryRankingList();
    alert('いいねの更新に失敗しました。もう一度お試しください。');
  }
}

function applyLikeChange(item, shouldLike){
  const uid = currentUser.uid;
  if(shouldLike){
    if(!item.likedBy.includes(uid)) item.likedBy = item.likedBy.concat(uid);
  }else{
    item.likedBy = item.likedBy.filter(u => u !== uid);
  }
  item.likeCount = item.likedBy.length;
}

async function renderUserRanking(sortedUsers){
  if(sortedUsers.length === 0){
    rankCard.innerHTML = `
      <div class="rank-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 6h18M5 6v14M19 6v14M2 3h20M7 10h10"/></svg>
        まだこの区分のデータがありません
      </div>`;
    setupMoreButton(0);
    return;
  }

  // 表示中の各ユーザーの photoURL / ひとこと(bio) を取得しておく（タップ時に再取得しないようキャッシュする）
  const withProfile = await Promise.all(sortedUsers.map(async (entry) => {
    if(!entry.uid) return { ...entry, photoURL:null, bio:'' };
    try{
      const doc = await db.collection('users').doc(entry.uid).get();
      const data = doc.exists ? doc.data() : null;
      return { ...entry, photoURL: (data && data.photoURL) || null, bio: (data && data.bio) || '' };
    }catch(e){
      console.warn('ユーザー情報の取得に失敗しました', e);
      return { ...entry, photoURL:null, bio:'' };
    }
  }));

  userProfileCache = withProfile;

  const medalClasses = ['m1','m2','m3'];
  rankCard.innerHTML = withProfile.map((entry, i) => {
    const medalClass = medalClasses[i] || 'mn';
    const extraClass = i >= 5 ? ' rank-row-extra' : '';
    const initial = escapeHtml((entry.name || '？').trim().charAt(0).toUpperCase() || '？');
    const avatar = entry.photoURL
      ? `<img class="rank-avatar" src="${escapeHtml(entry.photoURL)}" alt="" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'rank-avatar',textContent:'${initial}'}))">`
      : `<div class="rank-avatar">${initial}</div>`;
    return `
      <div class="rank-row tappable${extraClass}" data-index="${i}">
        <div class="rank-medal ${medalClass}">${i+1}</div>
        ${avatar}
        <div class="rank-name">${escapeHtml(entry.name)}</div>
        <div class="rank-count">${entry.count.toLocaleString()}個</div>
      </div>`;
  }).join('');

  setupMoreButton(withProfile.length);
}

/* 6位以降の表示切り替え（「もっと見る」ボタン）と、上に戻るボタンの表示制御。
   スコープ／期間の切り替えで再描画されるたびに、6位以降は必ず一旦隠した状態に戻す。 */
function setupMoreButton(totalCount){
  if(totalCount > 5){
    rankMoreBtn.style.display = 'block';
  }else{
    rankMoreBtn.style.display = 'none';
  }
  scrollTopWrap.classList.remove('show');
}

rankMoreBtn.addEventListener('click', () => {
  rankCard.querySelectorAll('.rank-row-extra').forEach(row => row.classList.remove('rank-row-extra'));
  rankMoreBtn.style.display = 'none';
  scrollTopWrap.classList.add('show');
});

scrollTopBtn.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

/* ユーザー別ランキングの行タップ → 詳細モーダル（順位・アイコン・ニックネーム・ひとこと） */
let userProfileCache = [];

rankCard.addEventListener('click', (e) => {
  const likeBtn = e.target.closest('.like-btn');
  if(likeBtn){
    toggleLike(likeBtn.dataset.id, likeBtn);
    return;
  }

  const row = e.target.closest('.rank-row.tappable');
  if(!row) return;
  const idx = Number(row.dataset.index);
  const entry = userProfileCache[idx];
  if(!entry) return;

  const initial = escapeHtml((entry.name || '？').trim().charAt(0).toUpperCase() || '？');
  userDetailRank.textContent = `${idx+1}位`;
  userDetailAvatar.innerHTML = entry.photoURL
    ? `<img src="${escapeHtml(entry.photoURL)}" alt="" referrerpolicy="no-referrer" onerror="this.parentElement.textContent='${initial}'">`
    : initial;
  userDetailName.textContent = entry.name;
  userDetailBio.textContent = entry.bio && entry.bio.trim() ? entry.bio.trim() : 'ひとことはまだ設定されていません';
  userDetailOverlay.classList.add('show');
});

function closeUserDetail(){
  userDetailOverlay.classList.remove('show');
}
userDetailClose.addEventListener('click', closeUserDetail);
userDetailOverlay.addEventListener('click', (e) => {
  if(e.target === userDetailOverlay) closeUserDetail();
});

scopeTabs.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if(!btn) return;
  scopeTabs.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentScope = btn.dataset.scope;
  loadRanking();
});

periodToggle.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if(!btn) return;
  periodToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPeriod = btn.dataset.period;
  loadRanking();
});

let resolved = false;
auth.onAuthStateChanged((user) => {
  if(resolved) return;
  resolved = true;
  if(!user){
    window.location.href = LOGIN_PAGE;
    return;
  }
  currentUser = user;
  overlay.style.opacity = '0';
  setTimeout(() => overlay.style.display = 'none', 350);
  loadRanking();
});
</script>
</body>
