<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>トレジャーシーカー伊勢 | クリーンマップ</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --forest:#3E6B4F; --forest-deep:#2C4E3A; --forest-soft:#EAF3EC;
    --cream:#FBF8F0; --card:#FFFFFF; --torii:#B5502F; --gold:#E3A73B;
    --ink:#233127; --ink-soft:#7A8A7D; --line:#E7E2D4;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0;}
  body{font-family:"Noto Sans JP", sans-serif; color:var(--ink); background:var(--forest-soft); display:flex; justify-content:center;}

  .stage{width:100%; max-width:480px; min-height:100vh; min-height:100dvh; background:var(--cream); display:flex; flex-direction:column; position:relative;}

  header{
    background:linear-gradient(155deg, var(--forest) 0%, var(--forest-deep) 100%);
    padding:calc(env(safe-area-inset-top,0px) + 16px) 18px 14px;
    color:#fff; position:relative; z-index:5;
  }
  .header-top{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .back-btn{
    width:32px; height:32px; border-radius:50%; flex-shrink:0;
    background:rgba(255,255,255,0.16); border:1px solid rgba(255,255,255,0.28);
    display:flex; align-items:center; justify-content:center;
    color:#fff; cursor:pointer;
  }
  .back-btn svg{width:16px; height:16px;}
  header h1{font-family:"Kiwi Maru", serif; font-weight:500; font-size:18px; margin:0;}

  .chips{display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0; display:flex; align-items:center; gap:5px;
    background:rgba(255,255,255,0.14); border:1px solid rgba(255,255,255,0.32);
    color:#fff; font-size:12px; font-weight:700;
    padding:7px 12px; border-radius:999px; cursor:pointer;
    transition:background .15s ease;
  }
  .chip svg{width:13px; height:13px;}
  .chip.active{background:#fff; color:var(--forest-deep); border-color:#fff;}
  .chip-divider{flex-shrink:0; width:1px; align-self:stretch; background:rgba(255,255,255,0.3); margin:2px 0;}

  .map-wrap{flex:1; position:relative;}
  #map{position:absolute; inset:0;}

  .legend{
    position:absolute; left:12px; right:62px; bottom:calc(env(safe-area-inset-bottom,0px) + 12px); z-index:900;
    background:rgba(255,255,255,0.95); border-radius:999px;
    padding:8px 14px; box-shadow:0 8px 20px rgba(44,78,58,0.18);
    display:flex; align-items:center; gap:8px;
    overflow-x:auto; scrollbar-width:none;
    white-space:nowrap;
  }
  .legend::-webkit-scrollbar{display:none;}
  .legend .title{font-weight:700; color:var(--ink); font-size:10.5px; flex-shrink:0;}
  .legend-row{display:flex; align-items:center; gap:3px; flex-shrink:0; font-size:10px; color:var(--ink-soft);}
  .legend-row .swatch{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .legend-sub{font-size:9px; color:var(--ink-soft); flex-shrink:0; padding-left:6px; margin-left:2px; border-left:1px solid var(--line);}

  .fab-col{
    position:absolute; right:12px; bottom:96px; z-index:900;
    display:flex; flex-direction:column; gap:10px;
  }
  .fab-col-top{
    position:absolute; right:12px; top:12px; z-index:900;
    display:flex; flex-direction:column; gap:8px;
  }
  .fab{
    width:44px; height:44px; border-radius:50%;
    background:#fff; box-shadow:0 8px 18px rgba(44,78,58,0.22);
    display:flex; align-items:center; justify-content:center;
    border:none; cursor:pointer; color:var(--forest-deep);
  }
  .fab.on{background:var(--forest); color:#fff;}
  .fab svg{width:19px; height:19px;}
  .fab-sm{
    width:34px; height:34px; border-radius:50%;
    background:#fff; box-shadow:0 6px 14px rgba(44,78,58,0.22);
    display:flex; align-items:center; justify-content:center;
    border:none; cursor:pointer; color:var(--forest-deep);
  }
  .fab-sm.on{background:var(--forest); color:#fff;}
  .fab-sm svg{width:15px; height:15px;}

  .popup-card{font-family:"Noto Sans JP", sans-serif; min-width:160px;}
  .popup-card .cat{display:inline-block; font-size:11px; font-weight:700; color:var(--forest-deep); background:var(--forest-soft); padding:2px 8px; border-radius:999px; margin-bottom:6px;}
  .popup-card .photo{width:100%; height:100px; object-fit:cover; border-radius:10px; margin-bottom:6px; background:#EFEBDF;}
  .popup-card .photo.skeleton{background:linear-gradient(90deg,#EFEBDF 25%,#F6F3E9 37%,#EFEBDF 63%); background-size:400% 100%; animation:sk 1.4s ease infinite;}
  @keyframes sk{0%{background-position:100% 50%;}100%{background-position:0 50%;}}
  .popup-card .nav-link{display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:700; color:var(--torii); text-decoration:none; margin-top:4px;}
  .popup-card .nav-link svg{width:13px; height:13px;}
  .popup-card .popup-actions{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:6px; flex-wrap:wrap;}
  .popup-card .collect-btn{
    display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:700;
    color:#fff; background:var(--forest); border:none; border-radius:999px;
    padding:6px 12px; cursor:pointer;
  }
  .popup-card .collect-btn svg{width:13px; height:13px;}
  .popup-card .collected-label{
    display:inline-flex; align-items:center; gap:4px; font-size:11.5px; font-weight:700;
    color:var(--ink-soft); background:var(--forest-soft); padding:5px 10px; border-radius:999px;
  }

  /* ---- ゴミ回収 記録シート ---- */
  .collect-overlay{
    position:fixed; inset:0; z-index:1000; background:rgba(20,28,20,0.5);
    display:none; align-items:flex-end; justify-content:center;
  }
  .collect-overlay.show{display:flex;}
  .collect-sheet{
    width:100%; max-width:480px; max-height:88vh; background:var(--cream);
    border-radius:22px 22px 0 0; display:flex; flex-direction:column; overflow:hidden;
  }
  .collect-sheet-header{display:flex; align-items:center; justify-content:space-between; padding:16px 18px 10px; flex-shrink:0;}
  .collect-sheet-header h2{font-family:"Kiwi Maru", serif; font-weight:500; font-size:16px; margin:0; color:var(--forest-deep);}
  .collect-close-btn{width:28px; height:28px; border-radius:50%; border:none; background:var(--forest-soft); color:var(--forest-deep); display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .collect-close-btn svg{width:14px; height:14px;}
  .collect-sheet-body{flex:1; overflow-y:auto; padding:0 18px 12px;}
  .collect-info{font-size:12.5px; color:var(--ink-soft); line-height:1.6; margin:0 0 12px;}
  .collect-card{background:var(--card); border-radius:16px; padding:14px; margin-bottom:12px; box-shadow:0 4px 12px rgba(44,78,58,0.05);}
  .collect-card-label{font-size:12px; font-weight:700; color:var(--ink-soft); margin-bottom:9px;}
  .collect-photo-zone{
    border:1.5px dashed var(--line); border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    height:130px; position:relative; overflow:hidden; background:#FAF8F1;
    color:var(--ink-soft); font-size:12px; cursor:pointer;
  }
  .collect-photo-zone img{width:100%; height:100%; object-fit:cover; position:absolute; inset:0;}
  .collect-photo-zone .hint{display:flex; flex-direction:column; align-items:center; gap:6px;}
  .collect-photo-zone .hint svg{width:24px; height:24px;}
  .collect-photo-remove{
    position:absolute; top:8px; right:8px; z-index:2;
    width:24px; height:24px; border-radius:50%; background:rgba(20,28,20,0.55);
    color:#fff; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer;
  }
  .collect-photo-remove svg{width:12px; height:12px;}
  .collect-sheet-footer{
    display:flex; gap:10px; padding:12px 18px calc(env(safe-area-inset-bottom,0px) + 14px);
    border-top:1px solid var(--line); flex-shrink:0; background:var(--cream);
  }
  .collect-sheet-footer button{flex:1; padding:13px; border-radius:14px; font-size:13.5px; font-weight:700; cursor:pointer; border:1.5px solid var(--line);}
  .collect-sheet-footer .collect-cancel{background:#fff; color:var(--ink);}
  .collect-sheet-footer .collect-submit{background:var(--forest); color:#fff; border-color:var(--forest);}
  .collect-sheet-footer .collect-submit:disabled{opacity:.55; cursor:not-allowed;}

  nav.bottom{
    position:fixed; left:50%; transform:translateX(-50%); bottom:0;
    width:100%; max-width:480px; background:var(--card);
    border-top:1px solid var(--line); display:flex;
    padding:8px 6px calc(env(safe-area-inset-bottom,0px) + 8px); z-index:10;
  }
  nav.bottom a{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; text-decoration:none; color:var(--ink-soft); font-size:10.5px; padding:4px 0;}
  nav.bottom a svg{width:20px; height:20px;}
  nav.bottom a.active{color:var(--forest-deep); font-weight:700;}
  nav.bottom a.active svg{color:var(--forest);}

  .loading-overlay{position:fixed; inset:0; z-index:99; background:var(--cream); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; transition:opacity .35s ease;}
  .loading-overlay .leaf{width:30px; height:30px; border:3px solid #DDE7DD; border-top-color:var(--forest); border-radius:50%; animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-overlay p{color:var(--ink-soft); font-size:13px; margin:0;}

  .toast{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    background:rgba(35,49,39,0.92); color:#fff; font-size:12.5px;
    padding:8px 16px; border-radius:999px; z-index:900;
    opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="leaf"></div>
  <p>読み込み中…</p>
</div>

<div class="stage">
  <header>
    <div class="header-top">
      <button class="back-btn" id="backBtn" title="戻る">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1>クリーンマップ</h1>
    </div>
    <div class="chips" id="categoryChips">
      <div class="chip active" data-cat="all">すべて</div>
      <div class="chip" data-cat="ペットボトル">💧 ペットボトル</div>
      <div class="chip" data-cat="たばこ吸い殻">🚬 たばこ吸い殻</div>
      <div class="chip" data-cat="空き缶">🥫 空き缶</div>
      <div class="chip" data-cat="プラスチック">♻️ プラスチック</div>
      <div class="chip" data-cat="ビン・ガラス">🍾 ビン・ガラス</div>
      <div class="chip" data-cat="紙類">📄 紙類</div>
      <div class="chip" data-cat="大型ゴミ">🛋️ 大型ゴミ</div>
      <div class="chip" data-cat="その他">🗑️ その他</div>
      <div class="chip" data-cat="危険">⚠️ 危険</div>
      <div class="chip-divider"></div>
      <div class="chip" data-cat="グルメ">🍴 グルメ</div>
      <div class="chip" data-cat="歴史・文化">🏯 歴史・文化</div>
      <div class="chip" data-cat="おすすめ">⭐ おすすめ</div>
    </div>
  </header>

  <div class="map-wrap">
    <div id="map"></div>

    <div class="legend" id="heatLegend">
      <div class="title" id="heatLegendTitle">ゴミの多さ（すべて）</div>
      <div class="legend-row"><span class="swatch" style="background:#4F8FE0;"></span>1〜3</div>
      <div class="legend-row"><span class="swatch" style="background:#4CAF6D;"></span>4〜7</div>
      <div class="legend-row"><span class="swatch" style="background:#F4D35E;"></span>8〜10</div>
      <div class="legend-row"><span class="swatch" style="background:#F0954B;"></span>11〜14</div>
      <div class="legend-row"><span class="swatch" style="background:#D9483B;"></span>15+</div>
      <div class="legend-sub">件数/10m</div>
    </div>

    <div class="fab-col-top">
      <button class="fab-sm" id="layerToggle" title="衛星写真に切替">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </button>
      <button class="fab-sm" id="locateBtn" title="現在地へ移動">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      </button>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <nav class="bottom">
    <a href="home.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      ホーム
    </a>
    <a class="active" href="map.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 20l-6-3V4l6 3 6-3 6 3v13l-6-3-6 3z"/><path d="M9 7v13M15 4v13"/></svg>
      マップ
    </a>
    <a href="discover.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      発見
    </a>
    <a href="mypage.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      マイページ
    </a>
  </nav>
</div>

<!-- 回収記録シート：他ユーザーが見つけたゴミを実際に回収した時に記録する -->
<div class="collect-overlay" id="collectOverlay">
  <div class="collect-sheet">
    <div class="collect-sheet-header">
      <h2>回収を記録</h2>
      <button class="collect-close-btn" id="collectCloseBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <div class="collect-sheet-body">
      <p class="collect-info">このゴミを回収したら、写真を添えて記録しましょう。あなたの発見・回収履歴に反映されます。</p>
      <div class="collect-card">
        <div class="collect-card-label">回収後の写真（任意）</div>
        <div class="collect-photo-zone" id="collectPhotoZone">
          <div class="hint" id="collectPhotoHint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            タップして撮影・選択
          </div>
          <img id="collectPhotoPreview" style="display:none;" alt="">
          <button type="button" class="collect-photo-remove" id="collectPhotoRemoveBtn" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </div>
        <input type="file" id="collectPhotoInput" accept="image/*" capture="environment" style="display:none;">
      </div>
    </div>
    <div class="collect-sheet-footer">
      <button class="collect-cancel" id="collectCancelBtn">キャンセル</button>
      <button class="collect-submit" id="collectSubmitBtn">回収を記録する</button>
    </div>
  </div>
</div>

<script>
/* =====================================================================
   Firebase 初期化（他ページと同じ設定にしてください）
   ===================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyB7f8QThoqYc-iDuMhKqp3MGBRAhln9ZhI",
  authDomain: "treasure-seeker-ise.firebaseapp.com",
  projectId: "treasure-seeker-ise",
  storageBucket: "treasure-seeker-ise.firebasestorage.app",
  messagingSenderId: "278199675502",
  appId: "1:278199675502:web:295dfa975a03707f27947f"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const LOGIN_PAGE = "login.html";
const ISE_CENTER = [34.4859, 136.7096]; // 伊勢神宮 内宮付近（現在地移動などの基準点として使用）
// 伊勢市全域（北の二見・小俣方面から南の宮川上流・旧御薗村エリアまで）が収まる範囲
const ISE_CITY_BOUNDS = L.latLngBounds([34.375, 136.615], [34.585, 136.825]);

const overlay   = document.getElementById('loadingOverlay');
const toastEl   = document.getElementById('toast');
const locateBtn = document.getElementById('locateBtn');
const layerToggle = document.getElementById('layerToggle');
const legendEl  = document.getElementById('heatLegend');
const heatLegendTitleEl = document.getElementById('heatLegendTitle');
const backBtn   = document.getElementById('backBtn');

const collectOverlay       = document.getElementById('collectOverlay');
const collectCloseBtn      = document.getElementById('collectCloseBtn');
const collectCancelBtn     = document.getElementById('collectCancelBtn');
const collectSubmitBtn     = document.getElementById('collectSubmitBtn');
const collectPhotoZone     = document.getElementById('collectPhotoZone');
const collectPhotoHint     = document.getElementById('collectPhotoHint');
const collectPhotoPreview  = document.getElementById('collectPhotoPreview');
const collectPhotoRemoveBtn= document.getElementById('collectPhotoRemoveBtn');
const collectPhotoInput    = document.getElementById('collectPhotoInput');

let collectTargetId = null;   // 回収対象の report id
let collectPhotoDataUrl = null; // 撮影・選択した写真（任意）

backBtn.addEventListener('click', () => {
  // 直前のページ（同じサイト内）に戻れるならブラウザ履歴で戻り、
  // 無ければ（外部リンクやリロード直後などで履歴が無い場合）ホームへ
  if(document.referrer && document.referrer.includes(location.origin) && window.history.length > 1){
    window.history.back();
  } else {
    window.location.href = 'home.html';
  }
});

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2200);
}

const map = L.map('map', { zoomControl:false }).fitBounds(ISE_CITY_BOUNDS);
L.control.zoom({ position:'bottomright' }).addTo(map);

/* ---------------------------------------------------------------------
   通常地図（OSM）と衛星写真（Esri World Imagery）の2種類のタイルを切替できるようにする
   --------------------------------------------------------------------- */
const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
});
const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  attribution: 'Tiles &copy; Esri'
});
let mapMode = 'street';
streetLayer.addTo(map);

layerToggle.addEventListener('click', () => {
  if(mapMode === 'street'){
    map.removeLayer(streetLayer);
    satelliteLayer.addTo(map);
    mapMode = 'satellite';
    layerToggle.classList.add('on');
    layerToggle.title = '通常地図に切替';
    showToast('衛星写真表示に切り替えました');
  } else {
    map.removeLayer(satelliteLayer);
    streetLayer.addTo(map);
    mapMode = 'street';
    layerToggle.classList.remove('on');
    layerToggle.title = '衛星写真に切替';
    showToast('通常地図表示に切り替えました');
  }
});

let allReports = []; // { id, lat, lng, category, memo, ... }
let activeCategory = 'all';
let heatLayerGroup = null;
let reportMarkerGroup = null; // 個別ゴミ地点タップ用（回収ボタンを出すため）
const MARKER_MIN_ZOOM = 15; // 込み合い防止のため、ある程度ズームしてから個別ピンを表示する

/* ---------------------------------------------------------------------
   履歴ページなどから ?lat=..&lng=..&id=.. 付きで遷移してきた場合、
   その地点へ地図を移動し、該当する報告のポップアップを開く。
   --------------------------------------------------------------------- */
const jumpParams = new URLSearchParams(window.location.search);
const jumpLat = parseFloat(jumpParams.get('lat'));
const jumpLng = parseFloat(jumpParams.get('lng'));
const jumpId  = jumpParams.get('id');
let didJumpToReport = false;

function maybeJumpToReport(){
  if(didJumpToReport) return;
  if(Number.isNaN(jumpLat) || Number.isNaN(jumpLng)) return;
  didJumpToReport = true;
  map.setView([jumpLat, jumpLng], 17);

  // ピン表示は廃止したので、対象地点を一時的にマーカーでハイライトする
  L.circleMarker([jumpLat, jumpLng], {
    radius:10, weight:3, color:'#3E6B4F', fillColor:'#F4D35E', fillOpacity:0.85
  }).addTo(map);

  if(!jumpId) return;
  const report = allReports.find(r => r.id === jumpId);
  if(!report) return;
  const popup = L.popup()
    .setLatLng([jumpLat, jumpLng])
    .setContent(buildPopupHtml(report))
    .openOn(map);
  const img = document.getElementById('photo-' + report.id);
  if(img) loadPhotoLazily(report.id, img);
}

/* ---------------------------------------------------------------------
   写真の遅延読み込み（reportPhotos コレクションを別管理）
   マーカーをクリックした時だけ該当写真を取得する。
   --------------------------------------------------------------------- */
async function loadPhotoLazily(reportId, imgEl){
  try{
    const doc = await db.collection('reportPhotos').doc(reportId).get();
    if(doc.exists && doc.data().imageBase64){
      imgEl.src = doc.data().imageBase64;
      imgEl.classList.remove('skeleton');
    } else {
      imgEl.remove();
    }
  }catch(e){
    console.warn('写真の取得に失敗しました', e);
    imgEl.remove();
  }
}

function buildPopupHtml(report){
  const gid = 'photo-' + report.id;
  const collectActionHtml = report.collected
    ? `<span class="collected-label">
         <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M20 6L9 17l-5-5"/></svg>
         回収済み
       </span>`
    : `<button type="button" class="collect-btn" data-report-id="${report.id}">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6L9 17l-5-5"/></svg>
         回収する
       </button>`;
  return `
    <div class="popup-card">
      <span class="cat">${escapeHtml(report.category || 'その他')}</span>
      <img class="photo skeleton" id="${gid}" alt="">
      <div>${escapeHtml(report.memo || '')}</div>
      <div class="popup-actions">
        <a class="nav-link" target="_blank" rel="noopener"
           href="https://www.google.com/maps/dir/?api=1&destination=${report.lat},${report.lng}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
          ここへ行く
        </a>
        ${collectActionHtml}
      </div>
    </div>`;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

/* ---------------------------------------------------------------------
   直径10m範囲ごとの件数を5段階の色で表示するヒートマップ（外部プラグイン不使用）。
   カテゴリ絞り込み（chips）にも連動し、「すべて」なら全件、特定カテゴリを
   選んでいればそのカテゴリだけで密度を再集計する。
   --------------------------------------------------------------------- */
const HEAT_TIERS = [
  { max: 3,        color: '#4F8FE0' }, // 1〜3個：青
  { max: 7,        color: '#4CAF6D' }, // 4〜7個：緑
  { max: 10,       color: '#F4D35E' }, // 8〜10個：黄
  { max: 14,       color: '#F0954B' }, // 11〜14個：オレンジ
  { max: Infinity, color: '#D9483B' }  // 15個以上：赤
];
function colorForCount(count){
  const tier = HEAT_TIERS.find(t => count <= t.max);
  return tier ? tier.color : HEAT_TIERS[HEAT_TIERS.length - 1].color;
}

// 10mに相当する緯度・経度の変化量を、伊勢市付近の緯度を基準に概算する
const HEAT_CELL_LAT = 10 / 111320;
const HEAT_CELL_LNG = 10 / (111320 * Math.cos(ISE_CENTER[0] * Math.PI / 180));

function renderHeatGrid(){
  if(heatLayerGroup){ map.removeLayer(heatLayerGroup); }
  heatLayerGroup = L.layerGroup();

  // ヒートマップも現在選択中のカテゴリchipの絞り込みに従う
  const targetReports = allReports.filter(r => {
    if(typeof r.lat !== 'number' || typeof r.lng !== 'number') return false;
    if(r.collected) return false; // 回収済みは密度に含めない
    return activeCategory === 'all' || r.category === activeCategory;
  });

  // 10m四方のグリッドに落とし込んで件数と重心座標を集計する
  const cells = {};
  targetReports.forEach(r => {
    const gx = Math.floor(r.lat / HEAT_CELL_LAT);
    const gy = Math.floor(r.lng / HEAT_CELL_LNG);
    const key = gx + '_' + gy;
    if(!cells[key]) cells[key] = { latSum:0, lngSum:0, count:0 };
    cells[key].latSum += r.lat;
    cells[key].lngSum += r.lng;
    cells[key].count += 1;
  });

  Object.values(cells).forEach(cell => {
    const centerLat = cell.latSum / cell.count;
    const centerLng = cell.lngSum / cell.count;
    const color = colorForCount(cell.count);
    L.circleMarker([centerLat, centerLng], {
      radius: 16, // 画面上のピクセル半径（ズームに関わらず一定サイズで見えるようにする）
      color,
      weight: 0,
      fillColor: color,
      fillOpacity: 0.65
    }).addTo(heatLayerGroup);
  });

  updateHeatLegendTitle();
  heatLayerGroup.addTo(map);
}

/* ---------------------------------------------------------------------
   個別ゴミ地点のピン表示。
   ヒートマップは密度を伝えるためのものなので、実際にその場所へ行って
   回収したいユーザーのために、ある程度ズームしたら個別にタップできる
   ピンも重ねて表示する（回収済みのものは表示しない＝もう行く必要がない）。
   --------------------------------------------------------------------- */
function renderReportMarkers(){
  if(reportMarkerGroup){ map.removeLayer(reportMarkerGroup); }
  reportMarkerGroup = L.layerGroup();

  if(map.getZoom() >= MARKER_MIN_ZOOM){
    // 回収済みでもピン自体は残す（ポップアップは引き続き見られるようにする。
    // ポップアップ内の「回収する」ボタンだけを buildPopupHtml 側で消す）
    const targetReports = allReports.filter(r => {
      if(typeof r.lat !== 'number' || typeof r.lng !== 'number') return false;
      return activeCategory === 'all' || r.category === activeCategory;
    });

    targetReports.forEach(r => {
      const marker = L.circleMarker([r.lat, r.lng], {
        radius: 9, weight: 2, color: '#fff',
        fillColor: r.collected ? '#9CA3AF' : '#3E6B4F', // 回収済みはグレーで見分けられるように
        fillOpacity: r.collected ? 0.75 : 0.95
      });
      marker.bindPopup(buildPopupHtml(r), { closeButton: true, maxWidth: 220 });
      marker.on('popupopen', () => {
        const img = document.getElementById('photo-' + r.id);
        if(img) loadPhotoLazily(r.id, img);
      });
      marker.addTo(reportMarkerGroup);
    });
  }

  reportMarkerGroup.addTo(map);
}

function updateHeatLegendTitle(){
  if(!heatLegendTitleEl) return;
  const chip = document.querySelector(`.chip[data-cat="${activeCategory}"]`);
  const label = activeCategory === 'all' ? 'すべて' : (chip ? chip.textContent.trim() : activeCategory);
  heatLegendTitleEl.textContent = `ゴミの多さ（${label}）`;
}

/* ---------------------------------------------------------------------
   Firestore の reports をリアルタイム購読
   想定フィールド: lat, lng, category, memo, createdAt
   --------------------------------------------------------------------- */
function subscribeReports(){
  db.collection('reports').limit(1000).onSnapshot(snap => {
    allReports = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderHeatGrid();
    renderReportMarkers();
    maybeJumpToReport();
  }, err => {
    console.error('reportsの取得に失敗しました', err);
    showToast('地図データを取得できませんでした');
  });
}

document.getElementById('categoryChips').addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if(!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeCategory = chip.dataset.cat;
  renderHeatGrid();
  renderReportMarkers();
});

// ズームレベルが変わったら、個別ピンの表示・非表示を切り替える
map.on('zoomend', renderReportMarkers);

/* ---------------------------------------------------------------------
   現在地取得。連打・古い応答を無視するため token 方式でキャンセルする。
   --------------------------------------------------------------------- */
let geoToken = 0;
locateBtn.addEventListener('click', () => {
  if(!navigator.geolocation){
    showToast('この端末は位置情報に対応していません');
    return;
  }
  const myToken = ++geoToken;
  locateBtn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      if(myToken !== geoToken) return; // 古い要求は破棄
      locateBtn.disabled = false;
      const { latitude, longitude } = pos.coords;
      map.setView([latitude, longitude], 16);
      L.circleMarker([latitude, longitude], {
        radius:8, color:'#3E6B4F', weight:2, fillColor:'#7FC98C', fillOpacity:0.9
      }).addTo(map);
    },
    (err) => {
      if(myToken !== geoToken) return;
      locateBtn.disabled = false;
      console.error(err);
      showToast('現在地を取得できませんでした');
    },
    { enableHighAccuracy:true, timeout:8000, maximumAge:15000 }
  );
});

/* ---------------------------------------------------------------------
   ポップアップ内の「回収する」ボタン（Leafletポップアップはその都度DOMに
   挿し込まれるため、documentに委譲してクリックを拾う）
   --------------------------------------------------------------------- */
document.addEventListener('click', (e) => {
  const btn = e.target.closest('.collect-btn');
  if(!btn) return;
  openCollectModal(btn.dataset.reportId);
});

function openCollectModal(reportId){
  const report = allReports.find(r => r.id === reportId);
  if(!report){
    showToast('データを取得できませんでした');
    return;
  }
  if(report.collected){
    showToast('このゴミはすでに回収済みです');
    return;
  }
  collectTargetId = reportId;
  collectPhotoDataUrl = null;
  collectPhotoInput.value = '';
  collectPhotoPreview.style.display = 'none';
  collectPhotoHint.style.display = 'flex';
  collectPhotoRemoveBtn.style.display = 'none';
  collectSubmitBtn.disabled = false;
  collectSubmitBtn.textContent = '回収を記録する';
  map.closePopup();
  collectOverlay.classList.add('show');
}

function closeCollectModal(){
  collectOverlay.classList.remove('show');
  collectTargetId = null;
}

collectCloseBtn.addEventListener('click', closeCollectModal);
collectCancelBtn.addEventListener('click', closeCollectModal);

/* 写真の撮影・選択（発見する ページ等と同じリサイズ設定） */
function resizeCollectPhotoToDataURL(file, maxSize = 720, quality = 0.75){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('ファイルの読み込みに失敗しました'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('画像として読み込めませんでした'));
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > h && w > maxSize){ h = Math.round(h * maxSize / w); w = maxSize; }
        else if(h > maxSize){ w = Math.round(w * maxSize / h); h = maxSize; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

collectPhotoZone.addEventListener('click', () => collectPhotoInput.click());
collectPhotoRemoveBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  collectPhotoDataUrl = null;
  collectPhotoInput.value = '';
  collectPhotoPreview.style.display = 'none';
  collectPhotoHint.style.display = 'flex';
  collectPhotoRemoveBtn.style.display = 'none';
});
collectPhotoInput.addEventListener('change', async () => {
  const file = collectPhotoInput.files && collectPhotoInput.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){
    showToast('画像ファイルを選んでください');
    return;
  }
  try{
    collectPhotoDataUrl = await resizeCollectPhotoToDataURL(file);
    collectPhotoPreview.src = collectPhotoDataUrl;
    collectPhotoPreview.style.display = 'block';
    collectPhotoHint.style.display = 'none';
    collectPhotoRemoveBtn.style.display = 'flex';
  }catch(err){
    console.error('写真の処理に失敗しました', err);
    showToast('写真を読み込めませんでした');
  }
});

/* ---------------------------------------------------------------------
   回収の記録本体：
   ①元の報告(reports)に collected フラグを付ける
   ②collections コレクションに回収記録を作成（回収したユーザーの履歴用）
   ③写真があれば collectionPhotos に分離して保存（一覧の遅延読み込みと同じ方式）
   --------------------------------------------------------------------- */
collectSubmitBtn.addEventListener('click', async () => {
  const user = auth.currentUser;
  if(!user){
    showToast('ログインが必要です');
    return;
  }
  const report = allReports.find(r => r.id === collectTargetId);
  if(!report){
    showToast('データを取得できませんでした');
    closeCollectModal();
    return;
  }

  collectSubmitBtn.disabled = true;
  collectSubmitBtn.textContent = '記録しています…';

  try{
    await db.collection('reports').doc(report.id).update({
      collected: true,
      collectedBy: user.uid,
      collectedAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    const collectionRef = db.collection('collections').doc();
    await collectionRef.set({
      reportId: report.id,
      reportUid: report.uid || null,
      collectorUid: user.uid,
      category: report.category || 'その他',
      town: report.town || null,
      memo: report.memo || '',
      lat: report.lat,
      lng: report.lng,
      hasPhoto: !!collectPhotoDataUrl,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    if(collectPhotoDataUrl){
      try{
        await db.collection('collectionPhotos').doc(collectionRef.id).set({
          imageBase64: collectPhotoDataUrl,
          uid: user.uid,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }catch(err){
        console.warn('回収写真の保存に失敗しました（回収記録自体は完了済み）', err);
      }
    }

    // 発見スタンプラリー用に、自分のユーザードキュメントへ回収件数のカウンタも
    // 直接加算しておく（history.htmlでの集計をcollectionsコレクションへの
    // count()クエリに頼らず、自分のユーザードキュメントの読み取りだけで
    // 完結させるため。collectionsコレクション自体への読み取り権限が無くても
    // スタンプ進捗には確実に反映される）
    try{
      await db.collection('users').doc(user.uid).set({
        collectionsCount: firebase.firestore.FieldValue.increment(1)
      }, { merge: true });
    }catch(err){
      console.warn('回収カウンタの更新に失敗しました（回収記録自体は完了済み）', err);
    }

    // ローカルの状態も更新して即座に地図へ反映する
    report.collected = true;
    report.collectedBy = user.uid;
    renderHeatGrid();
    renderReportMarkers();

    showToast('回収を記録しました。ありがとうございます！');
    closeCollectModal();
  }catch(err){
    console.error('回収の記録に失敗しました', err);
    showToast('記録に失敗しました。もう一度お試しください');
    collectSubmitBtn.disabled = false;
    collectSubmitBtn.textContent = '回収を記録する';
  }
});

/* 未ログインなら login.html へ */
let resolved = false;
auth.onAuthStateChanged((user) => {
  if(resolved) return;
  resolved = true;
  if(!user){
    window.location.href = LOGIN_PAGE;
    return;
  }
  overlay.style.opacity = '0';
  setTimeout(() => overlay.style.display = 'none', 350);
  subscribeReports();
});
</script>
