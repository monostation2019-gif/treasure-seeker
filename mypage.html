<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>トレジャーシーカー伊勢 | マイページ</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  :root{
    --forest:#3E6B4F; --forest-deep:#2C4E3A; --forest-soft:#EAF3EC;
    --cream:#FBF8F0; --card:#FFFFFF; --torii:#B5502F; --gold:#E3A73B;
    --ink:#233127; --ink-soft:#7A8A7D; --line:#E7E2D4;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0;}
  body{font-family:"Noto Sans JP", sans-serif; color:var(--ink); background:var(--forest-soft); display:flex; justify-content:center;}

  .stage{width:100%; max-width:480px; min-height:100vh; min-height:100dvh; background:var(--cream); display:flex; flex-direction:column; position:relative;}

  header{
    background:linear-gradient(155deg, var(--forest) 0%, var(--forest-deep) 100%);
    padding:calc(env(safe-area-inset-top,0px) + 16px) 18px 46px;
    color:#fff; border-radius:0 0 26px 26px; position:relative;
  }
  header h1{font-family:"Kiwi Maru", serif; font-weight:500; font-size:18px; margin:0;}

  main{flex:1; padding:0 18px 96px;}

  .profile-card{
    background:var(--card); border-radius:20px; padding:20px 18px;
    margin-top:-34px; box-shadow:0 12px 28px rgba(44,78,58,0.14);
    text-align:center; position:relative; z-index:2;
  }
  .avatar-wrap{ position:relative; width:72px; margin:0 auto 10px; }
  .avatar{
    width:72px; height:72px; border-radius:50%;
    background:var(--forest-soft); color:var(--forest-deep);
    display:flex; align-items:center; justify-content:center;
    font-size:28px; font-weight:900; margin:0;
    border:3px solid #fff; box-shadow:0 4px 12px rgba(44,78,58,0.18);
    object-fit:cover;
  }
  .avatar-edit-btn{
    position:absolute; right:-4px; bottom:-2px;
    width:26px; height:26px; border-radius:50%;
    background:var(--forest); color:#fff; border:2px solid #fff;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 8px rgba(44,78,58,0.3); cursor:pointer; padding:0;
  }
  .avatar-edit-btn svg{ width:13px; height:13px; }
  .avatar-edit-btn.busy{ opacity:.6; pointer-events:none; }
  .name-row{display:flex; align-items:center; justify-content:center; gap:6px;}
  .name-row h2{font-family:"Kiwi Maru", serif; font-weight:500; font-size:17px; margin:0;}
  .edit-name{background:none; border:none; color:var(--ink-soft); cursor:pointer; padding:2px;}
  .edit-name svg{width:14px; height:14px;}

  .level-badge{
    display:inline-flex; align-items:center; gap:6px;
    background:linear-gradient(135deg,#FCE9BE,#F4C86A); color:#8A5B0A;
    font-size:12px; font-weight:900; padding:5px 12px; border-radius:999px;
    margin-top:8px;
  }
  .level-badge svg{width:13px; height:13px;}

  .title-chip{
    display:inline-block; margin-top:8px; font-size:11.5px; font-weight:700;
    color:var(--forest-deep); background:var(--forest-soft); padding:4px 12px; border-radius:999px;
  }

  .stats-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:0; margin-top:18px; border-top:1px solid var(--line); padding-top:16px;}
  .stats-grid .stat{text-align:center;}
  .stats-grid .stat + .stat{border-left:1px solid var(--line);}
  .stats-grid .num{font-family:"Kiwi Maru", serif; font-size:20px; color:var(--forest-deep); line-height:1;}
  .stats-grid .label{font-size:11px; color:var(--ink-soft); margin-top:6px;}

  .section-label{font-size:12.5px; color:var(--ink-soft); font-weight:700; margin:22px 2px 10px;}

  .bio-card{
    background:var(--card); border-radius:16px; padding:14px 16px 12px;
    box-shadow:0 6px 16px rgba(44,78,58,0.06);
  }
  .bio-input{
    width:100%; border:none; resize:none; font-family:inherit; font-size:13.5px;
    color:var(--ink); line-height:1.6; min-height:60px; padding:0; outline:none;
    background:transparent;
  }
  .bio-input::placeholder{color:var(--ink-soft);}
  .bio-footer{
    display:flex; align-items:center; justify-content:space-between;
    margin-top:8px; padding-top:10px; border-top:1px solid var(--line);
  }
  .bio-count{font-size:11px; color:var(--ink-soft);}
  .bio-save{
    border:none; background:var(--forest-soft); color:var(--forest-deep);
    font-size:12.5px; font-weight:700; padding:7px 16px; border-radius:999px; cursor:pointer;
  }
  .bio-save:active{background:var(--forest); color:#fff;}
  .bio-save.saved{background:var(--forest); color:#fff;}

  .badge-row{display:flex; gap:10px; flex-wrap:wrap;}
  .badge{
    width:56px; display:flex; flex-direction:column; align-items:center; gap:5px;
  }
  .badge .ico{
    width:48px; height:48px; border-radius:50%;
    background:var(--forest-soft); display:flex; align-items:center; justify-content:center;
    font-size:20px;
  }
  .badge.locked .ico{background:#F1EEE3; color:#C9C3AE; filter:grayscale(1); opacity:.7;}
  .badge span{font-size:9.5px; color:var(--ink-soft); text-align:center; line-height:1.3;}

  .menu-card{background:var(--card); border-radius:16px; box-shadow:0 6px 16px rgba(44,78,58,0.06); overflow:hidden;}
  .menu-row{
    display:flex; align-items:center; gap:12px; padding:14px 16px;
    text-decoration:none; color:var(--ink); font-size:14px; position:relative;
  }
  .menu-row + .menu-row{border-top:1px solid var(--line);}
  .menu-row .ico{width:30px; height:30px; border-radius:9px; background:var(--forest-soft); color:var(--forest-deep); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .menu-row .ico svg{width:15px; height:15px;}
  .menu-row .arrow{margin-left:auto; color:var(--ink-soft);}
  .menu-row .arrow svg{width:14px; height:14px;}
  .menu-row.soon{color:var(--ink-soft); pointer-events:none;}
  .menu-row.soon .badge-soon{
    font-size:10px; background:#F1EEE3; color:var(--ink-soft);
    padding:2px 8px; border-radius:999px; margin-left:auto;
  }
  .menu-row.logout{color:var(--torii); font-weight:700; cursor:pointer;}
  .menu-row.logout .ico{background:#FCEFE3; color:var(--torii);}

  nav.bottom{
    position:fixed; left:50%; transform:translateX(-50%); bottom:0;
    width:100%; max-width:480px; background:var(--card);
    border-top:1px solid var(--line); display:flex;
    padding:8px 6px calc(env(safe-area-inset-bottom,0px) + 8px); z-index:10;
  }
  nav.bottom a{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; text-decoration:none; color:var(--ink-soft); font-size:10.5px; padding:4px 0;}
  nav.bottom a svg{width:20px; height:20px;}
  nav.bottom a.active{color:var(--forest-deep); font-weight:700;}
  nav.bottom a.active svg{color:var(--forest);}

  .loading-overlay{position:fixed; inset:0; z-index:99; background:var(--cream); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; transition:opacity .35s ease;}
  .loading-overlay .leaf{width:30px; height:30px; border:3px solid #DDE7DD; border-top-color:var(--forest); border-radius:50%; animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-overlay p{color:var(--ink-soft); font-size:13px; margin:0;}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="leaf"></div>
  <p>読み込み中…</p>
</div>

<div class="stage">
  <header><h1>マイページ</h1></header>

  <main>
    <div class="profile-card">
      <div class="avatar-wrap">
        <img class="avatar" id="avatarImg" style="display:none;" alt="">
        <div class="avatar" id="avatarFallback">?</div>
        <button class="avatar-edit-btn" id="avatarEditBtn" title="プロフィール画像を変更">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
        <input type="file" id="avatarInput" accept="image/*" style="display:none;">
      </div>

      <div class="name-row">
        <h2 id="displayName">読み込み中…</h2>
        <button class="edit-name" id="editNameBtn" title="ニックネームを編集">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
        </button>
      </div>

      <div class="level-badge">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.6-5.2 4.6 1.6 6.7L12 16.9 5.8 20.2l1.6-6.7L2.2 8.9l6.9-.6z"/></svg>
        <span id="levelText">Lv.1</span>
      </div>
      <div><span class="title-chip" id="titleChip">称号なし</span></div>

      <div class="stats-grid">
        <div class="stat"><div class="num" id="statFinds">0</div><div class="label">総発見数</div></div>
        <div class="stat"><div class="num" id="statCollected">0</div><div class="label">総回収数</div></div>
        <div class="stat"><div class="num" id="statCO2">0kg</div><div class="label">CO2削減量</div></div>
      </div>
    </div>

    <div class="section-label">ひとこと</div>
    <div class="bio-card">
      <textarea class="bio-input" id="bioInput" maxlength="50" placeholder="皆に自己紹介や意気込みをひとこと書いてみましょう"></textarea>
      <div class="bio-footer">
        <span class="bio-count"><span id="bioCount">0</span>/50</span>
        <button class="bio-save" id="bioSaveBtn">保存する</button>
      </div>
    </div>

    <div class="section-label">バッジ</div>
    <div class="badge-row" id="badgeRow"></div>

    <div class="section-label">メニュー</div>
    <div class="menu-card">
      <a class="menu-row" href="history.html">
        <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg></div>
        発見・回収履歴
        <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></span>
      </a>
      <a class="menu-row" href="ranking.html">
        <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M5 6v14M19 6v14M2 3h20M7 10h10"/></svg></div>
        ランキングを見る
        <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></span>
      </a>
      <div class="menu-row logout" id="logoutRow">
        <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg></div>
        ログアウト
      </div>
    </div>
  </main>

  <nav class="bottom">
    <a href="home.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      ホーム
    </a>
    <a href="map.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 20l-6-3V4l6 3 6-3 6 3v13l-6-3-6 3z"/><path d="M9 7v13M15 4v13"/></svg>
      マップ
    </a>
    <a href="discover.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      発見
    </a>
    <a class="active" href="mypage.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      マイページ
    </a>
  </nav>
</div>

<script>
/* =====================================================================
   Firebase 初期化（他ページと同じ設定にしてください）
   ===================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyB7f8QThoqYc-iDuMhKqp3MGBRAhln9ZhI",
  authDomain: "treasure-seeker-ise.firebaseapp.com",
  projectId: "treasure-seeker-ise",
  storageBucket: "treasure-seeker-ise.firebasestorage.app",
  messagingSenderId: "278199675502",
  appId: "1:278199675502:web:295dfa975a03707f27947f"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const LOGIN_PAGE = "login.html";

const overlay        = document.getElementById('loadingOverlay');
const avatarImg       = document.getElementById('avatarImg');
const avatarFallback  = document.getElementById('avatarFallback');
const displayNameEl   = document.getElementById('displayName');
const levelTextEl     = document.getElementById('levelText');
const titleChipEl     = document.getElementById('titleChip');
const statFindsEl     = document.getElementById('statFinds');
const statCollectedEl = document.getElementById('statCollected');
const statCO2El       = document.getElementById('statCO2');
const badgeRowEl      = document.getElementById('badgeRow');
const editNameBtn     = document.getElementById('editNameBtn');
const bioInput        = document.getElementById('bioInput');
const bioCount        = document.getElementById('bioCount');
const bioSaveBtn      = document.getElementById('bioSaveBtn');
const logoutRow       = document.getElementById('logoutRow');
const avatarEditBtn   = document.getElementById('avatarEditBtn');
const avatarInput     = document.getElementById('avatarInput');

/* バッジのマスターデータ。user.badges (id配列) に含まれていれば獲得済み表示にする。
   実際のバッジ体系が決まったら内容を差し替えてください。 */
const BADGE_MASTER = [
  { id:'first_find',   emoji:'🌱', label:'はじめの一歩' },
  { id:'coast_master', emoji:'🌊', label:'海岸マスター' },
  { id:'week_streak',  emoji:'🔥', label:'7日連続' },
  { id:'bulky_hunter', emoji:'🛋️', label:'大型ゴミ回収' },
  { id:'top_ranker',   emoji:'🏆', label:'週間1位' }
];

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function renderBadges(earnedIds){
  const earned = new Set(earnedIds || []);
  badgeRowEl.innerHTML = BADGE_MASTER.map(b => `
    <div class="badge ${earned.has(b.id) ? '' : 'locked'}">
      <div class="ico">${b.emoji}</div>
      <span>${escapeHtml(b.label)}</span>
    </div>
  `).join('');
}

function renderProfile(data, user){
  const name = data.displayName || (user.isAnonymous ? 'ゲスト冒険者' : '名無しの発見者');
  displayNameEl.textContent = name;

  if(data.photoURL){
    avatarImg.src = data.photoURL;
    avatarImg.style.display = 'block';
    avatarFallback.style.display = 'none';
  } else {
    avatarFallback.textContent = name.charAt(0) || '?';
    avatarFallback.style.display = 'flex';
    avatarImg.style.display = 'none';
  }

  levelTextEl.textContent = `Lv.${data.level || 1}`;
  titleChipEl.textContent = data.title || '称号なし';

  statFindsEl.textContent = (data.totalFinds || 0).toLocaleString();
  statCollectedEl.textContent = (data.totalCollected || 0).toLocaleString();

  /* CO2削減量は仮の概算式（1個あたり約0.02kg換算）。
     実際の算出ロジックが決まったら差し替えてください。 */
  const co2 = ((data.totalFinds || 0) * 0.02).toFixed(1);
  statCO2El.textContent = `${co2}kg`;

  renderBadges(data.badges);

  bioInput.value = data.bio || '';
  bioCount.textContent = bioInput.value.length;
}

editNameBtn.addEventListener('click', async () => {
  const user = auth.currentUser;
  if(!user) return;
  const current = displayNameEl.textContent;
  const next = prompt('新しいニックネームを入力してください（全角12文字まで）', current);
  if(next === null) return;
  const trimmed = next.trim().slice(0, 12);
  if(!trimmed) return;

  try{
    await db.collection('users').doc(user.uid).set({ displayName: trimmed }, { merge:true });
    displayNameEl.textContent = trimmed;
    if(!avatarImg.src){ avatarFallback.textContent = trimmed.charAt(0); }
  }catch(err){
    console.error('ニックネームの更新に失敗しました', err);
    alert('更新に失敗しました。もう一度お試しください。');
  }
});

/* ---------------------------------------------------------------------
   プロフィール画像の変更
   Firebase Storageは使わず、まちみっけ等と同じ「リサイズしてbase64化 →
   Firestoreのフィールドに直接保存」方式。240px程度の正方形に縮小した上で
   JPEG圧縮するので、Firestoreの1ドキュメント1MB制限にも収まるサイズになる。
   --------------------------------------------------------------------- */
function resizeImageToDataURL(file, maxSize = 240, quality = 0.82){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('ファイルの読み込みに失敗しました'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('画像として読み込めませんでした'));
      img.onload = () => {
        // 中央を正方形にクロップしてからmaxSizeへ縮小する
        const srcSize = Math.min(img.width, img.height);
        const sx = (img.width - srcSize) / 2;
        const sy = (img.height - srcSize) / 2;

        const canvas = document.createElement('canvas');
        canvas.width = maxSize;
        canvas.height = maxSize;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, sx, sy, srcSize, srcSize, 0, 0, maxSize, maxSize);

        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

avatarEditBtn.addEventListener('click', () => {
  avatarInput.click();
});

avatarInput.addEventListener('change', async () => {
  const file = avatarInput.files && avatarInput.files[0];
  avatarInput.value = ''; // 同じファイルを連続選択しても change が発火するように
  if(!file) return;

  if(!file.type.startsWith('image/')){
    alert('画像ファイルを選んでください。');
    return;
  }
  // 元ファイルが極端に大きい場合のみ入口で軽く制限（リサイズ自体はこの後行う）
  if(file.size > 15 * 1024 * 1024){
    alert('画像サイズが大きすぎます。15MB以下の画像を選んでください。');
    return;
  }

  const user = auth.currentUser;
  if(!user) return;

  avatarEditBtn.classList.add('busy');
  try{
    const dataUrl = await resizeImageToDataURL(file);

    // Firestore 1ドキュメント上限(1MB)に対する安全マージン確認
    if(dataUrl.length > 900 * 1024){
      alert('画像の変換後サイズが大きすぎます。別の画像でお試しください。');
      return;
    }

    await db.collection('users').doc(user.uid).set({ photoURL: dataUrl }, { merge:true });

    avatarImg.src = dataUrl;
    avatarImg.style.display = 'block';
    avatarFallback.style.display = 'none';
  }catch(err){
    console.error('プロフィール画像の更新に失敗しました', err);
    alert('画像の更新に失敗しました。もう一度お試しください。');
  }finally{
    avatarEditBtn.classList.remove('busy');
  }
});

/* ---------------------------------------------------------------------
   「ひとこと」（自己紹介文）の編集・保存。
   ranking.html のユーザー詳細モーダルで表示している users/{uid}.bio と同じフィールド。
   --------------------------------------------------------------------- */
bioInput.addEventListener('input', () => {
  bioCount.textContent = bioInput.value.length;
});

bioSaveBtn.addEventListener('click', async () => {
  const user = auth.currentUser;
  if(!user) return;
  const trimmed = bioInput.value.trim().slice(0, 50);
  bioInput.value = trimmed;
  bioCount.textContent = trimmed.length;

  const originalLabel = bioSaveBtn.textContent;
  bioSaveBtn.disabled = true;
  try{
    await db.collection('users').doc(user.uid).set({ bio: trimmed }, { merge:true });
    bioSaveBtn.textContent = '保存しました！';
    bioSaveBtn.classList.add('saved');
    setTimeout(() => {
      bioSaveBtn.textContent = originalLabel;
      bioSaveBtn.classList.remove('saved');
    }, 1600);
  }catch(err){
    console.error('ひとことの更新に失敗しました', err);
    alert('更新に失敗しました。もう一度お試しください。');
  }finally{
    bioSaveBtn.disabled = false;
  }
});

logoutRow.addEventListener('click', async () => {
  if(!confirm('ログアウトしますか？')) return;
  await auth.signOut();
  window.location.href = LOGIN_PAGE;
});

let resolved = false;
auth.onAuthStateChanged(async (user) => {
  if(resolved) return;
  resolved = true;

  if(!user){
    window.location.href = LOGIN_PAGE;
    return;
  }

  try{
    const snap = await db.collection('users').doc(user.uid).get();
    renderProfile(snap.exists ? snap.data() : {}, user);
  }catch(err){
    console.error('プロフィールの取得に失敗しました', err);
    displayNameEl.textContent = '取得エラー';
  }

  overlay.style.opacity = '0';
  setTimeout(() => overlay.style.display = 'none', 350);
});
</script>
</body>
</html>
