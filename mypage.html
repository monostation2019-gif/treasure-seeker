<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>マイページ - トレジャーシーカー伊勢</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#1E3A5F" />
<link rel="stylesheet" href="shared/style.css" />
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <a href="home.html" class="back-btn">←</a>
    <h1>👤 マイページ</h1>
  </header>

  <main class="app-main">

    <div class="profile-header">
      <div class="profile-avatar" id="profile-avatar">?</div>
      <div>
        <div class="profile-name" id="profile-name">-</div>
        <div class="profile-sub" id="profile-sub">-</div>
      </div>
    </div>

    <div class="stat-grid" style="margin-bottom:14px;">
      <div class="stat-box">
        <div class="label">累計発見数</div>
        <div class="value" id="stat-total"><small></small></div>
      </div>
      <div class="stat-box">
        <div class="label">環境貢献度スコア</div>
        <div class="value" id="stat-score"><small>pt</small></div>
      </div>
    </div>

    <div class="card" id="history">
      <p class="card-title">♻️ 資源回収履歴</p>
      <div id="history-list">
        <div class="empty-state"><div class="icon">⏳</div>読み込み中…</div>
      </div>
    </div>

    <button class="btn btn-danger" id="btn-logout">ログアウト</button>

  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="shared/firebase-config.js"></script>
<script src="shared/app-common.js"></script>
<script>
  renderBottomNav("mypage");

  requireAuth((user) => {
    loadProfile(user);
    loadHistory(user);
  });

  async function loadProfile(user) {
    document.getElementById("profile-name").textContent = user.displayName || "ゲスト冒険者";
    document.getElementById("profile-sub").textContent = user.isAnonymous ? "ゲストログイン" : user.email || "";
    const avatarEl = document.getElementById("profile-avatar");
    if (user.photoURL) {
      avatarEl.innerHTML = `<img src="${user.photoURL}" />`;
    } else {
      avatarEl.textContent = (user.displayName || "?").charAt(0);
    }

    db.collection("users")
      .doc(user.uid)
      .onSnapshot((snap) => {
        const d = snap.data() || {};
        document.getElementById("stat-total").innerHTML = `${d.totalFinds || 0}<small>個</small>`;
        document.getElementById("stat-score").innerHTML = `${d.contributionScore || 0}<small>pt</small>`;
      });
  }

  function loadHistory(user) {
    db.collection("finds")
      .where("uid", "==", user.uid)
      .orderBy("createdAt", "desc")
      .limit(30)
      .onSnapshot(
        (snap) => {
          const el = document.getElementById("history-list");
          if (snap.empty) {
            el.innerHTML = `<div class="empty-state"><div class="icon">📭</div>まだ記録がありません。<br/>マップから発見を記録してみましょう！</div>`;
            return;
          }
          el.innerHTML = snap.docs
            .map((doc) => {
              const d = doc.data();
              const cat = getCategory(d.category);
              return `
              <div class="history-row">
                <div class="cat-icon">${cat.icon}</div>
                <div class="meta">
                  <div class="cat">${cat.label}${d.size === "large" ? "（大型）" : ""}</div>
                  <div class="date">${d.town ? d.town + " ・ " : ""}${formatDateTime(d.createdAt)}</div>
                </div>
              </div>`;
            })
            .join("");
        },
        (err) => {
          console.error(err);
          document.getElementById("history-list").innerHTML =
            `<div class="empty-state"><div class="icon">⚠️</div>履歴の取得に失敗しました</div>`;
        }
      );
  }

  document.getElementById("btn-logout").addEventListener("click", () => {
    if (confirm("ログアウトしますか？")) logout();
  });

  if (location.hash === "#history") {
    setTimeout(() => document.getElementById("history").scrollIntoView({ behavior: "smooth" }), 300);
  }
</script>
</body>
</html>
