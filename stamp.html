<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ホーム | トレジャーシーカー伊勢</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell" id="app-shell" style="display:none;">

  <div class="page-header">
    <div class="eyebrow">TREASURE SEEKER ISE</div>
    <h1 id="greeting">おかえりなさい</h1>
  </div>

  <div class="section">
    <div class="card" style="display:flex;align-items:center;gap:14px;margin-bottom:16px;">
      <div style="width:48px;height:48px;border-radius:50%;background:var(--forest);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:18px;flex:0 0 auto;" id="avatar-initial">親</div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;" id="username-label">-</div>
        <div style="font-size:12px;color:var(--sumi-soft);" id="level-label">Lv.1</div>
      </div>
      <a href="mypage.html" style="font-size:12px;color:var(--sea);font-weight:700;">マイページ ›</a>
    </div>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="label">総発見数</div>
        <div class="value" id="stat-finds">0<small>件</small></div>
      </div>
      <div class="stat-card">
        <div class="label">回収した大型ゴミ</div>
        <div class="value" id="stat-collected">0<small>個</small></div>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <div style="font-weight:700;margin-bottom:10px;">クイックアクション</div>
      <div style="display:flex;gap:10px;">
        <a href="map.html" class="btn btn-primary" style="text-decoration:none;">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>
          ゴミを見つけた
        </a>
        <a href="stamp.html" class="btn btn-outline" style="text-decoration:none;">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M8.5 13.5 6 22l6-3 6 3-2.5-8.5"/></svg>
          スタンプ帳
        </a>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-weight:700;">ゴミ発見マップ</div>
        <a href="map.html" style="font-size:12px;color:var(--sea);font-weight:700;">全体を見る ›</a>
      </div>
      <div style="font-size:12px;color:var(--sumi-soft);margin-bottom:8px;">発見の多さを5段階の色で表示しています</div>
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="font-size:11px;color:var(--sumi-soft);">少ない</span>
        <span style="flex:1;height:8px;border-radius:999px;background:linear-gradient(to right,var(--heat-1),var(--heat-2),var(--heat-3),var(--heat-4),var(--heat-5));"></span>
        <span style="font-size:11px;color:var(--sumi-soft);">多い</span>
      </div>
    </div>
  </div>
</div>

<div class="splash" id="loading-splash">
  <div class="spinner"></div>
  <div style="font-weight:700;">読み込み中...</div>
</div>

<!-- 下部ナビゲーション -->
<nav class="bottom-nav">
  <a href="home.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10h14V10"/></svg>
    ホーム<span class="nav-dot"></span>
  </a>
  <a href="map.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>
    マップ<span class="nav-dot"></span>
  </a>
  <a href="stamp.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M8.5 13.5 6 22l6-3 6 3-2.5-8.5"/></svg>
    スタンプ帳<span class="nav-dot"></span>
  </a>
  <a href="ranking.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v5a5 5 0 0 1-10 0V4z"/><path d="M7 6H4a3 3 0 0 0 3 5"/><path d="M17 6h3a3 3 0 0 1-3 5"/></svg>
    ランキング<span class="nav-dot"></span>
  </a>
  <a href="mypage.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
    マイページ<span class="nav-dot"></span>
  </a>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/util.js"></script>
<script src="js/auth-guard.js"></script>
<script>
document.addEventListener("auth-ready", async (e) => {
  const user = e.detail.user;
  try {
    const doc = await db.collection("users").doc(user.uid).get();
    const data = doc.exists ? doc.data() : {};

    const username = data.username || "冒険者";
    document.getElementById("greeting").textContent = `おかえりなさい、${username}さん`;
    document.getElementById("username-label").textContent = username;
    document.getElementById("level-label").textContent = `Lv.${data.level || 1}`;
    document.getElementById("avatar-initial").textContent = username.charAt(0);
    document.getElementById("stat-finds").innerHTML = `${data.totalFinds || 0}<small>件</small>`;
    document.getElementById("stat-collected").innerHTML = `${data.totalCollected || 0}<small>個</small>`;
  } catch (err) {
    console.error(err);
    showToast("データの取得に失敗しました");
  } finally {
    document.getElementById("loading-splash").style.display = "none";
    document.getElementById("app-shell").style.display = "block";
  }
});
</script>
</body>
</html>
