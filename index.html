<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>トレジャーシーカー伊勢</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#1E3A5F" />
<link rel="stylesheet" href="shared/style.css" />
</head>
<body>
<div class="loading-screen">
  <div class="spinner"></div>
  <div class="msg">起動中…</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="shared/firebase-config.js"></script>
<script>
  // フォールバック用タイマーは、下の認証処理でエラーが起きても必ず動くように
  // 別のscriptブロックとして独立させておく（1つのscript内でエラーが起きると
  // 同じブロック内の後続コードが実行されなくなるため）。
  setTimeout(() => {
    const loading = document.querySelector(".loading-screen");
    if (loading && !window.__TS_ISE_REDIRECTED__) {
      const msg = loading.querySelector(".msg");
      if (window.__TS_ISE_CONFIG_OK__ === false) {
        if (msg) msg.textContent = "Firebaseの設定が未入力のため起動できません（上の赤い帯を確認してください）";
      } else {
        if (msg) msg.textContent = "接続できませんでした。ログイン画面に移動します…";
        window.location.replace("login.html");
      }
    }
  }, 4000);
</script>
<script>
  // index.html はエントリーポイント専用。ログイン状態に応じて振り分けるだけにして、
  // 重いUIコードを持たせないことでSafariでの初期クラッシュを防ぐ。
  try {
    if (window.__TS_ISE_CONFIG_OK__ === false) {
      // 設定未入力バナーはfirebase-config.js側で表示済みなのでここでは何もしない
    } else {
      auth.onAuthStateChanged(
        (user) => {
          window.__TS_ISE_REDIRECTED__ = true;
          window.location.replace(user ? "home.html" : "login.html");
        },
        (err) => {
          console.error("認証状態の確認に失敗:", err);
        }
      );
    }
  } catch (e) {
    console.error("Firebase初期化エラー:", e);
  }
</script>
</body>
</html>
