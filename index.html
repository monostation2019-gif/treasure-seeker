<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>トレジャーシーカー伊勢</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#1E3A5F" />
<link rel="stylesheet" href="shared/style.css" />
</head>
<body>
<div class="loading-screen">
  <div class="spinner"></div>
  <div class="msg">起動中…</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="shared/firebase-config.js"></script>
<script>
  // index.html はエントリーポイント専用。ログイン状態に応じて振り分けるだけにして、
  // 重いUIコードを持たせないことでSafariでの初期クラッシュを防ぐ。
  auth.onAuthStateChanged((user) => {
    window.location.replace(user ? "home.html" : "login.html");
  });
  // 万一onAuthStateChangedが応答しない場合のフォールバック
  setTimeout(() => {
    if (document.querySelector(".loading-screen")) {
      window.location.replace("login.html");
    }
  }, 4000);
</script>
</body>
</html>
